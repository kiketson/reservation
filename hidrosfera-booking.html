<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidrosfera — Baja California Sur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Public+Sans:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   HIDROSFERA — DESIGN TOKENS
   Palette drawn from the Sea of Cortez: deep offshore blue,
   lagoon teal shallows, sun-bleached sand, coral accent.
   ============================================================ */
:root{
  --deep:      #0B3D4C;   /* offshore water / primary dark   */
  --deep-2:    #082B36;   /* deeper shade for gradients       */
  --teal:      #1C7C82;   /* lagoon / interactive accent      */
  --teal-lt:   #2E9AA0;
  --sand:      #EDE4D3;   /* page background                  */
  --sand-2:    #E3D7C0;
  --foam:      #FBFAF7;   /* card surfaces                    */
  --coral:     #E8734A;   /* CTA / highlight accent           */
  --coral-dk:  #C85A34;
  --ink:       #10262B;   /* body text                        */
  --ink-soft:  #4A5D61;
  --line:      #D9CEB8;
  --ok:        #2E7D4F;
  --ok-bg:     #E6F2EA;
  --warn:      #B8860B;
  --warn-bg:   #FBF3DD;
  --err:       #C0392B;
  --err-bg:    #FBEAE7;

  --font-display: 'Fraunces', serif;
  --font-body: 'Public Sans', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;

  --radius-s: 8px;
  --radius-m: 14px;
  --radius-l: 22px;
  --shadow-card: 0 1px 2px rgba(11,61,76,.06), 0 8px 24px rgba(11,61,76,.08);
  --shadow-pop: 0 12px 40px rgba(11,61,76,.22);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family: var(--font-body);
  background: var(--sand);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  min-height:100vh;
}
h1,h2,h3,h4{font-family:var(--font-display); font-weight:600; margin:0; color:var(--deep);}
p{margin:0;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{color:inherit;}
::selection{ background: var(--coral); color:#fff; }
:focus-visible{ outline:3px solid var(--coral); outline-offset:2px; }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:.01ms !important; transition-duration:.01ms !important; }
}

.hidden{ display:none !important; }
.container{ max-width:1180px; margin:0 auto; padding:0 28px; }

/* ============================================================
   TOP MASTHEAD (kept minimal — brand only, not the tracker)
   ============================================================ */
.masthead{
  background: linear-gradient(180deg, var(--deep) 0%, var(--deep-2) 100%);
  color: var(--foam);
  padding: 22px 0;
}
.masthead .container{ display:flex; align-items:center; justify-content:space-between; }
.brand{ display:flex; align-items:center; gap:12px; }
.brand-mark{ width:38px; height:38px; flex-shrink:0; }
.brand-name{ font-family:var(--font-display); font-size:22px; font-weight:600; letter-spacing:.01em; }
.brand-tag{ font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--teal-lt); margin-top:2px; }
.masthead-right{ display:flex; align-items:center; gap:18px; font-size:14px; color:var(--sand); }
.languageBar{ position:relative; display:flex; gap:2px; background:rgba(255,255,255,.08); border-radius:999px; padding:4px; }
.languageBar .option{
  position:relative; z-index:1; border:none; background:transparent; color:var(--sand); padding:6px 11px; border-radius:999px;
  font-size:12.5px; font-weight:600; white-space:nowrap; transition: color .2s; font-family:var(--font-body);
}
.languageBar .option.active{ color:#fff; }
.languageBar .slider{
  position:absolute; top:4px; left:4px; height:calc(100% - 8px); width:calc(20% - 2px);
  background:var(--coral); border-radius:999px; transition: transform .25s cubic-bezier(.2,.9,.25,1); z-index:0;
}
@media (max-width:640px){
  .languageBar .option{ font-size:0; padding:6px 8px; }
  .languageBar .option::after{ content: attr(data-short); font-size:11.5px; font-family:var(--font-body); }
}

/* ============================================================
   SIGNATURE ELEMENT — the "tide line" step tracker.
   A wavy channel that fills with rising water as the visitor
   completes each step; a boat marker sits at the current step.
   This sits BELOW the masthead, sticky, so people always know
   where they are in the booking.
   ============================================================ */
.tideband{
  position: sticky; top:0; z-index:40;
  background: var(--foam);
  border-bottom:1px solid var(--line);
  box-shadow: 0 4px 16px rgba(11,61,76,.06);
}
@media (max-width:640px){
  .tideband{ position:static; }
}
.tideband-inner{ position:relative; padding: 18px 28px 10px; max-width:1180px; margin:0 auto; }
.tide-svg{ width:100%; height:34px; display:block; }
.tide-steps{ display:flex; justify-content:space-between; margin-top:2px; }
.tide-step{ flex:1; text-align:center; position:relative; }
.tide-step-label{
  font-family:var(--font-mono); font-size:11.5px; letter-spacing:.06em; text-transform:uppercase;
  color: var(--ink-soft); font-weight:500; transition: color .3s, font-weight .3s;
}
.tide-step.is-current .tide-step-label{ color: var(--coral-dk); font-weight:700; }
.tide-step.is-done .tide-step-label{ color: var(--teal); }
.tide-step-num{ font-family:var(--font-mono); font-size:10px; color:var(--ink-soft); opacity:.6; }

/* ============================================================
   LAYOUT SHELL
   ============================================================ */
main{ padding-bottom: 140px; min-height: 60vh; }
.step-panel{ padding: 36px 0 20px; }
.step-panel.is-step-transition{ animation: rise .45s ease; }
@keyframes rise{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

.eyebrow{
  font-family:var(--font-mono); font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--teal);
  margin-bottom:8px; display:block;
}
.step-title{ font-size: clamp(28px, 4vw, 40px); margin-bottom:8px; }
.step-sub{ color:var(--ink-soft); font-size:16px; max-width:640px; line-height:1.5; margin-bottom:32px; }

/* ============================================================
   ACTIVITIES GRID
   ============================================================ */
.activities-grid{
  display:grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap:24px;
}
.activity-card{
  background: var(--foam); border-radius: var(--radius-l); overflow:hidden; box-shadow: var(--shadow-card);
  border: 2px solid transparent; transition: transform .25s ease, box-shadow .25s ease, border-color .2s ease;
  display:flex; flex-direction:column; position:relative;
}
.activity-card:hover{ transform: translateY(-4px); box-shadow: 0 16px 40px rgba(11,61,76,.16); }
.activity-card.is-selected{ border-color: var(--coral); }
.activity-media{
  height:150px; position:relative; display:flex; align-items:flex-end; padding:14px;
  color:#fff; overflow:hidden;
}
.activity-media::after{ content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(11,61,76,0) 30%, rgba(8,32,40,.55) 100%); }
.activity-media-icon{ font-size:38px; position:relative; z-index:1; filter: drop-shadow(0 2px 6px rgba(0,0,0,.25)); }
.activity-category{
  position:absolute; top:12px; left:12px; z-index:2; background:rgba(251,250,247,.92); color:var(--deep);
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; padding:4px 10px; border-radius:999px; font-weight:600;
}
.activity-body{ padding:18px 18px 20px; display:flex; flex-direction:column; gap:10px; flex:1; }
.activity-name{ font-size:19px; line-height:1.25; }
.activity-desc{ font-size:13.5px; color:var(--ink-soft); line-height:1.5; flex:1; }
.activity-meta{ display:flex; gap:14px; font-size:12.5px; color:var(--ink-soft); font-family:var(--font-mono); }
.activity-price-row{ display:flex; align-items:center; justify-content:space-between; margin-top:4px; }
.activity-price{ font-family:var(--font-display); font-size:21px; color:var(--deep); font-weight:600; }
.activity-price small{ font-family:var(--font-body); font-size:12px; color:var(--ink-soft); font-weight:400; }
.activity-price .strike{ font-size:13px; text-decoration:line-through; color:var(--ink-soft); font-family:var(--font-body); margin-right:6px; }
.discount-pill{ background:var(--coral); color:#fff; font-size:10.5px; font-family:var(--font-mono); padding:2px 8px; border-radius:999px; font-weight:700; }
.select-toggle{
  border:1.5px solid var(--deep); background:transparent; color:var(--deep); border-radius:999px; padding:9px 16px; font-weight:600; font-size:13.5px;
  transition: all .2s ease; display:flex; align-items:center; justify-content:center; gap:6px; flex-shrink:0; white-space:nowrap;
}
.select-toggle:hover{ background: var(--deep); color:#fff; }
.activity-card.is-selected .select-toggle{ background: var(--coral); border-color:var(--coral); color:#fff; }
.activity-links{ display:flex; gap:14px; margin-top:2px; }
.activity-links button{ background:none; border:none; padding:0; font-size:12.5px; font-weight:600; color:var(--teal); }
.activity-links button:hover{ text-decoration:underline; }
.activity-links a{ font-size:12.5px; font-weight:600; color:var(--coral-dk); text-decoration:none; }
.activity-links a:hover{ text-decoration:underline; }
.chip-date{ font-family:var(--font-mono); font-size:11px; opacity:.85; margin-left:2px; }
.info-list{ margin:0; padding-left:18px; font-size:13.5px; line-height:1.7; color:var(--ink-soft); }
.info-block-title{ font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--teal); margin:16px 0 6px; }

/* ============================================================
   STICKY SELECTION BAR (lower div)
   ============================================================ */
.selection-bar{
  position: fixed; left:0; right:0; bottom:0; z-index:50;
  background: linear-gradient(180deg, var(--deep-2) 0%, var(--deep) 100%);
  color:var(--foam);
  box-shadow: 0 -8px 30px rgba(0,0,0,.25);
  transform: translateY(110%); transition: transform .4s cubic-bezier(.2,.9,.25,1);
}
.selection-bar.is-visible{ transform: translateY(0); }
.selection-bar-inner{
  margin:0 auto; padding:14px 24px 16px; display:flex; flex-direction:column; gap:10px;
}
.selection-list{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:center; max-height:min(30vh, 170px); overflow-y:auto; }
.selection-chip{
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.18); padding:6px 12px 6px 12px; border-radius:14px;
  font-size:13px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; max-width:min(280px, 80vw); animation: chipIn .3s ease;
  font-family:inherit; color:var(--foam); cursor:default;
}
button.selection-chip{ cursor:pointer; transition:background .15s, border-color .15s; }
button.selection-chip:hover{ background:rgba(255,255,255,.18); }
.selection-chip-status-ok{ border-color:rgba(120,200,150,.6); background:rgba(120,200,150,.14); }
.selection-chip-status-pending{ border-color:rgba(232,115,74,.55); background:rgba(232,115,74,.14); }
.selection-chip-add{ border-style:dashed; border-color:rgba(255,255,255,.4); font-weight:700; }
@keyframes chipIn{ from{opacity:0; transform:scale(.85);} to{opacity:1; transform:scale(1);} }
.selection-chip button{ background:none; border:none; color:rgba(255,255,255,.7); font-size:15px; line-height:1; padding:0; flex-shrink:0; }
.selection-chip button:hover{ color:#fff; }
.selection-total{ font-family:var(--font-mono); font-size:15px; font-weight:700; color:#fff; text-align:center; white-space:nowrap; }
.selection-bar-buttons{ display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; }
.bar-back-btn-hidden{ visibility:hidden; }
@media (min-width:900px){
  .selection-bar{ left:15%; right:15%; width:70%; bottom:18px; border-radius:24px; box-shadow:0 16px 50px rgba(0,0,0,.35); }
  .selection-chip{ font-size:19.5px; padding:9px 18px; gap:9px; max-width:min(420px, 80vw); border-radius:21px; }
  .selection-chip button{ font-size:22px; }
}
@media (max-width:520px){
  .selection-bar-buttons{ justify-content:center; }
  .selection-total{ order:-1; width:100%; margin-bottom:2px; }
  .btn{ padding:12px 18px; font-size:13.5px; }
}
.btn{
  border:none; border-radius:999px; padding:13px 26px; font-weight:700; font-size:14.5px; letter-spacing:.01em;
  transition: transform .15s ease, box-shadow .15s ease, background .2s, opacity .2s; display:inline-flex; align-items:center; gap:8px;
}
.btn:active{ transform: scale(.97); }
.btn-primary{ background: var(--coral); color:#fff; box-shadow:0 6px 18px rgba(232,115,74,.35); }
.btn-primary:hover{ background: var(--coral-dk); }
.btn-primary:disabled{ opacity:.4; cursor:not-allowed; box-shadow:none; }
.btn-ghost{ background: transparent; color: var(--foam); border:1.5px solid rgba(255,255,255,.3); }
.btn-ghost:hover{ border-color:#fff; }
.btn-outline{ background:transparent; color:var(--deep); border:1.5px solid var(--deep); }
.btn-outline:hover{ background:var(--deep); color:#fff; }
.btn-deep{ background:var(--deep); color:var(--foam); }
.btn-deep:hover{ background:var(--deep-2); }
.btn-text{ background:none; color:var(--teal); font-weight:600; padding:8px 4px; }
.btn-text:hover{ text-decoration:underline; }
.btn-sm{ padding:8px 16px; font-size:13px; }

/* ============================================================
   FOOTER NAV (Back / Continue) — appears within each step panel
   ============================================================ */
.step-nav{ display:flex; justify-content:space-between; align-items:center; margin-top:40px; padding-top:24px; border-top:1px solid var(--line); }

/* ============================================================
   CALENDAR (dates step)
   ============================================================ */
.dates-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(380px, 420px)); gap:24px; justify-content:center; }
.dates-activity-block{
  background:var(--foam); border-radius:var(--radius-l); padding:26px; box-shadow:var(--shadow-card);
  border:2px solid transparent; max-width:420px; width:100%;
}
.dates-activity-block.has-date{ border-color: var(--ok); }
.dates-activity-block.missing-date{ border-color: var(--err); animation: shake .4s; }
@keyframes shake{ 10%,90%{transform:translateX(-2px);} 20%,80%{transform:translateX(3px);} 30%,50%,70%{transform:translateX(-5px);} 40%,60%{transform:translateX(5px);} }
.dates-activity-head{ display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:18px; flex-wrap:wrap; }
.dates-activity-title{ display:flex; align-items:center; gap:12px; }
.dates-activity-title .ico{ font-size:26px; }
.date-status-badge{ font-family:var(--font-mono); font-size:11.5px; padding:5px 12px; border-radius:999px; font-weight:600; letter-spacing:.03em; }
.date-status-badge.pending{ background:var(--err-bg); color:var(--err); }
.date-status-badge.done{ background:var(--ok-bg); color:var(--ok); }
.cal-wrap{ display:flex; flex-direction:column; align-items:center; gap:14px; max-width:340px; margin:0 auto; }
.cal-grid-wrap{ width:100%; }
.cal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.cal-head button{ background:var(--sand); border:none; width:26px; height:26px; border-radius:50%; font-size:14px; color:var(--deep); }
.cal-head button:disabled{ opacity:.25; cursor:not-allowed; }
.cal-month-label{ font-family:var(--font-display); font-weight:600; font-size:14px; color:var(--deep); }
.cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.cal-dow{ text-align:center; font-family:var(--font-mono); font-size:9.5px; color:var(--ink-soft); padding-bottom:4px; text-transform:uppercase; }
.cal-day{
  aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:7px; font-size:12px;
  background:var(--sand); color:var(--ink); border:none; position:relative; transition:all .15s ease;
}
.tour-hours{ font-family:var(--font-mono); font-size:12px; color:var(--teal); margin-top:3px; display:flex; align-items:center; gap:5px; }
.cal-day-arrow{ position:absolute; bottom:2px; left:50%; transform:translateX(-50%); font-size:8px; line-height:1; font-weight:700; }
.cal-day.out-range{ visibility:hidden; }
.cal-day.disabled{ background:transparent; color:var(--line); cursor:not-allowed; }
.cal-day.unavailable{ background:var(--err-bg); color:var(--err); text-decoration:line-through; cursor:not-allowed; }
.cal-day.available:hover{ background:var(--teal-lt); color:#fff; }
.cal-day.selected{ background:var(--coral); color:#fff; font-weight:700; box-shadow:0 4px 10px rgba(232,115,74,.4); }
.cal-day.in-range{ background:rgba(232,115,74,.18); color:var(--ink); border-radius:4px; }
.cal-day.today::after{ content:""; position:absolute; bottom:4px; width:4px; height:4px; border-radius:50%; background:var(--teal); }
.cal-legend{ display:flex; gap:16px; flex-wrap:wrap; margin-top:14px; font-size:12px; color:var(--ink-soft); }
.cal-legend span{ display:inline-flex; align-items:center; gap:6px; }
.legend-dot{ width:10px; height:10px; border-radius:3px; display:inline-block; }
.cal-side{ width:100%; }
.selected-date-display{ background:var(--sand); border-radius:var(--radius-m); padding:16px; text-align:center; }
.selected-date-display .label{ font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); }
.selected-date-display .value{ font-family:var(--font-display); font-size:20px; color:var(--deep); margin-top:6px; }
.selected-date-display .empty{ color:var(--err); font-size:13px; font-weight:600; }

/* ============================================================
   PEOPLE STEP
   ============================================================ */
.contact-toggle-row{
  display:flex; align-items:center; gap:12px; background:var(--foam); border-radius:var(--radius-m); padding:16px 20px; margin-bottom:24px; box-shadow:var(--shadow-card);
}
.checkbox-row{ display:flex; flex-direction:row; align-items:flex-start; gap:10px; }
.field.checkbox-row{ display:flex; flex-direction:row; align-items:flex-start; gap:10px; }
.checkbox-row input[type=checkbox]{ margin-top:2px; width:18px; height:18px; accent-color:var(--coral); flex-shrink:0; }
.checkbox-row label{ font-size:14px; line-height:1.4; }

.person-card{
  background:var(--foam); border-radius:var(--radius-l); box-shadow:var(--shadow-card); margin-bottom:22px; overflow:hidden;
  border:2px solid transparent; transition:border-color .3s ease; scroll-margin-top:110px;
}
.person-card.is-complete{ border-color: var(--ok); }
.person-card.is-invalid{ border-color: var(--err); }
.person-head{ display:flex; align-items:center; justify-content:space-between; padding:18px 24px; background:rgba(11,61,76,.03); cursor:pointer; }
.person-head-left{ display:flex; align-items:center; gap:12px; }
.person-badge{
  width:32px; height:32px; border-radius:50%; background:var(--deep); color:#fff; display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:13px; font-weight:600; flex-shrink:0;
}
.person-card.is-complete .person-badge{ background: var(--ok); }
.person-title{ font-family:var(--font-display); font-size:17px; color:var(--deep); }
.person-main-contact-tag{ font-size:11px; font-family:var(--font-mono); color:var(--teal); font-weight:600; letter-spacing:.04em; margin-top:2px; }
.person-status{ font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.06em; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.person-status.ok{ color:var(--ok); }
.person-status.pending{ color:var(--ink-soft); }
.person-progress-count{ color:var(--ink-soft); font-weight:400; text-transform:none; letter-spacing:0; }
.person-head-left{ display:flex; align-items:center; gap:14px; cursor:pointer; flex:1; min-width:0; }
.person-head-actions{ display:flex; align-items:center; gap:18px; }
.icon-btn{ background:transparent; border:none; color:var(--ink-soft); font-size:16px; padding:6px; border-radius:6px; }
.icon-btn:hover{ background:var(--err-bg); color:var(--err); }
.icon-btn-delete{ font-size:18px; padding:8px; }
.chevron-btn{ background:var(--sand); border:none; border-radius:50%; width:38px; height:38px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition: background .15s; flex-shrink:0; }
.chevron-btn:hover{ background:var(--sand-2); }
.chevron{ transition: transform .25s ease; color: var(--deep); font-size:18px; display:inline-block; }
.person-card.is-collapsed .chevron{ transform: rotate(-90deg); }
.person-body{ padding:24px; display:flex; flex-direction:column; gap:18px; }
.person-card.is-collapsed .person-body{ display:none; }

.field-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:16px; }
.field{ display:flex; flex-direction:column; gap:6px; min-width:0; }
.field.span-2{ grid-column: span 2; }
.field label{ font-size:12.5px; font-weight:600; color:var(--ink-soft); letter-spacing:.01em; }
.field label .req{ color:var(--coral); }
.field input[type=text], .field input[type=email], .field input[type=date], .field input[type=number], .field select, .field textarea{
  border:1.5px solid var(--line); background:#fff; border-radius:var(--radius-s); padding:11px 13px; font-size:14.5px; color:var(--ink);
  transition: border-color .2s ease, box-shadow .2s ease; width:100%;
}
.field input:focus, .field select:focus, .field textarea:focus{ border-color:var(--teal); box-shadow:0 0 0 3px rgba(28,124,130,.15); outline:none; }

<script>
/* ---------------------------------------------------------------------
   HOST COMPATIBILITY SHIM
   window.storage is provided automatically inside Claude.ai's artifact
   sandbox. Once these files are hosted on a normal web server, that API
   doesn't exist — so this shim recreates the same interface using the
   browser's own localStorage whenever window.storage isn't already
   present. Same app code runs unmodified in both places.

   IMPORTANT LIMITATION: localStorage lives only in one visitor's own
   browser. It is NOT a shared database — two different customers (or
   the same customer on a different device) will not see each other's
   bookings, and the admin panel will only show bookings made in the
   same browser. This is fine for a solo demo/test of the interface,
   but a real launch needs a real backend + database (see the notes
   near the bottom of this file's script for what that involves).
   --------------------------------------------------------------------- */
if(!window.storage){
  window.storage = (function(){
    const PREFIX = 'hidrosfera_store::';
    const keyFor = (key, shared) => PREFIX + (shared ? 'shared::' : 'private::') + key;
    return {
      async get(key, shared){
        const raw = localStorage.getItem(keyFor(key, shared));
        if(raw === null) throw new Error('Key not found: ' + key);
        return { key, value: raw, shared: !!shared };
      },
      async set(key, value, shared){
        localStorage.setItem(keyFor(key, shared), value);
        return { key, value, shared: !!shared };
      },
      async delete(key, shared){
        localStorage.removeItem(keyFor(key, shared));
        return { key, deleted: true, shared: !!shared };
      },
      async list(prefix, shared){
        const full = keyFor(prefix || '', shared);
        const base = keyFor('', shared);
        const keys = [];
        for(let i=0; i<localStorage.length; i++){
          const k = localStorage.key(i);
          if(k && k.startsWith(full)) keys.push(k.slice(base.length));
        }
        return { keys, prefix, shared: !!shared };
      }
    };
  })();
}
</script>
<script>
/* =====================================================================
   LANGUAGE SWITCHER — adapted from the user's own lang.js.
   Same mechanism: any element with a `tr="..."` attribute gets its
   innerText replaced with translations[thatExactText] whenever the
   locale changes. Translation dictionaries are fetched from
   /lang/{locale}.json — see the /lang/ folder shipped alongside this
   file, and the note at the bottom of this block for what that means
   for hosting.
   ===================================================================== */
const defaultLocale = "en";
const supportedLocales = ["en", "es", "fr", "jp", "pt"];
let locale;
let translations = {};

async function setLocale(newLocale){
  if(newLocale === locale) return;
  const newTranslations = await fetchTranslationsFor(newLocale);
  locale = newLocale;
  translations = newTranslations;
  translatePage();
  // Keep the app's own "preferred language" default (used for the
  // traveler's preferred-language field and the confirmation email)
  // in sync with whichever locale is showing on screen.
  if(typeof state !== 'undefined'){
    state.pageLanguage = newLocale;
    if(state.sameAsFirst && state.mainContact) state.mainContact.language = newLocale;
  }
}
async function fetchTranslationsFor(newLocale){
  try{
    const response = await fetch(`/lang/${newLocale}.json`);
    if(!response.ok) throw new Error('not found');
    return await response.json();
  } catch(e){
    console.warn(`Could not load /lang/${newLocale}.json — is this page hosted with a /lang/ folder at the site root? Falling back to untranslated text.`, e);
    return {};
  }
}
function translatePage(){
  document.querySelectorAll("[tr]").forEach(el => translateElement(el));
}
function translateElement(element){
  const key = element.getAttribute("tr");
  const translation = translations[key];
  if(translation) element.innerText = translation;
  // If there's no entry for this key (e.g. a locale file that hasn't
  // been filled in yet, or admin-entered content with no translation),
  // we leave the original text in place rather than blanking it out.
}
function interpolate(message, vars){
  if(!message) return message;
  return message.replace(/\{(\w+)\}/g, (m, k) => (vars && vars[k] != null) ? vars[k] : m);
}
function translate(key, interpolations = {}){
  return interpolate(translations[key], interpolations);
}
function isSupported(loc){ return supportedLocales.indexOf(loc) > -1; }
function supportedOrDefault(locs){ return locs.find(isSupported) || defaultLocale; }
function browserLocales(languageCodeOnly = false){
  return (navigator.languages || [navigator.language || defaultLocale]).map(l => languageCodeOnly ? l.split("-")[0] : l);
}
function initLanguageSlider(){
  const bar = document.querySelector('.languageBar');
  if(!bar) return () => {};
  const options = bar.querySelectorAll('.option');
  const slider = document.createElement('div');
  slider.className = 'slider';
  bar.appendChild(slider);
  function updateSlider(index){ slider.style.transform = `translateX(${index * 100}%)`; }
  const initialIndex = Array.from(options).findIndex(btn => btn.classList.contains('active'));
  updateSlider(initialIndex >= 0 ? initialIndex : 0);
  return updateSlider;
}
function bindLocaleSwitcher(initialValue, onUpdateSlider){
  const switcher = document.querySelector("[tr-switcher]");
  if(!switcher) return;
  switcher.value = initialValue;
  const buttons = switcher.querySelectorAll('.option');
  buttons.forEach((button, index) => {
    button.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      button.classList.add('active');
      setLocale(button.dataset.value);
      if(typeof onUpdateSlider === 'function') onUpdateSlider(index);
    });
  });
}
document.addEventListener("DOMContentLoaded", () => {
  const switcher = document.querySelector("[tr-switcher]");
  if(!switcher) return;
  const buttons = switcher.querySelectorAll('.option');
  const initialLocale = supportedOrDefault(browserLocales(true));
  setLocale(initialLocale);
  buttons.forEach(b => b.classList.toggle('active', b.dataset.value === initialLocale));
  const updateSlider = initLanguageSlider();
  bindLocaleSwitcher(initialLocale, updateSlider);
});
</script>
<script>
/* =====================================================================
   HIDROSFERA BOOKING APP
   Single-file front-end prototype. Persists via window.storage (Claude
   artifact key/value store). See bottom of file for integration notes
   on real email + backend, left as clearly marked TODOs.
   ===================================================================== */

/* ---------------------------------------------------------------------
   STORAGE KEYS
   'activities' and 'availability' are SHARED — because in the real
   product the admin panel (phase 2) edits them and every visitor must
   see the same catalog / calendar. 'clients' and 'bookings' are also
   shared, functioning as the (mock) database until a real backend
   exists. Nothing here is per-user private data.
   --------------------------------------------------------------------- */
const SK = {
  activities:   'hidrosfera:activities',
  availability: 'hidrosfera:availability',
  clients:      'hidrosfera:clients',
  bookings:     'hidrosfera:bookings',
  settings:     'hidrosfera:settings'   // admin notification email, etc. (phase 2)
};

async function storeGet(key, shared){
  try{ const r = await window.storage.get(key, !!shared); return r ? JSON.parse(r.value) : null; }
  catch(e){ return null; }
}
async function storeSet(key, value, shared){
  try{ await window.storage.set(key, JSON.stringify(value), !!shared); return true; }
  catch(e){ console.error('storage set failed', key, e); return false; }
}

const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const MAX_DATE = new Date(TODAY); MAX_DATE.setMonth(MAX_DATE.getMonth() + 30); // 2.5 years

function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9); }
function fmtDate(d){ return d.toISOString().slice(0,10); }
function parseDate(s){ const [y,m,day] = s.split('-').map(Number); return new Date(y, m-1, day); }
function fmtDateHuman(s){
  if(!s) return '';
  const d = parseDate(s);
  return d.toLocaleDateString('en-US', {weekday:'short', year:'numeric', month:'short', day:'numeric'});
}
function fmtMoney(n){ return 'MX$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0}); }
function fmtMoneyLong(n){ return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0}) + ' MXN'; }
function fmtTime12(t){
  if(!t) return '';
  const [h,m] = t.split(':').map(Number);
  const period = h>=12 ? 'PM' : 'AM';
  let h12 = h % 12; if(h12===0) h12=12;
  return `${h12}:${String(m).padStart(2,'0')} ${period}`;
}
function meetupLine(a){ return (a && a.meetupTime) ? `Meetup: ${fmtTime12(a.meetupTime)}` : ''; }
function escapeAttr(s){ return String(s).replace(/"/g,'&quot;'); }
function todayISO(){ return fmtDate(TODAY); }

/* ---------------------------------------------------------------------
   TIDE-LINE STEP TRACKER (signature element)
   Renders a wavy channel; the portion up to the current step is
   "filled" with water color, and a boat marker sits at the current
   step's x position. Labels update state/current/done classes.
   --------------------------------------------------------------------- */
function renderTideTracker(){
  const stepsWrap = document.getElementById('tideSteps');
  stepsWrap.innerHTML = STEPS.map((s,i)=>{
    const cls = i === state.step ? 'is-current' : (i < state.step ? 'is-done' : '');
    return `<div class="tide-step ${cls}" data-step-index="${i}">
              <div class="tide-step-num">0${i+1}</div>
              <div class="tide-step-label" tr="${s.label}">${s.label}</div>
            </div>`;
  }).join('');

  // Position the boat + fill along the wave path proportionally to progress.
  const path = document.getElementById('tideChannel');
  const fill = document.getElementById('tideFill');
  const boat = document.getElementById('tideBoat');
  const total = path.getTotalLength();
  const frac = STEPS.length <= 1 ? 1 : state.step / (STEPS.length - 1);
  const len = total * frac;
  fill.setAttribute('stroke-dasharray', `${len} ${total}`);
  const pt = path.getPointAtLength(len);
  boat.setAttribute('transform', `translate(${pt.x - 8}, ${pt.y - 14})`);

  // Allow clicking an already-completed step to jump back.
  stepsWrap.querySelectorAll('.tide-step').forEach(el=>{
    el.style.cursor = 'default';
    const idx = Number(el.dataset.stepIndex);
    if(idx < state.step && idx <= state.furthestStepReached){
      el.style.cursor = 'pointer';
      el.addEventListener('click', ()=> goToStep(idx));
    }
  });
}

function goToStep(idx){
  state.step = idx;
  window.scrollTo({top:0, behavior:'smooth'});
  render();
}

function nextStep(){
  if(!validateCurrentStep()) return;
  state.step = Math.min(state.step + 1, STEPS.length - 1);
  state.furthestStepReached = Math.max(state.furthestStepReached, state.step);
  window.scrollTo({top:0, behavior:'smooth'});
  render();
}
function prevStep(){
  state.step = Math.max(state.step - 1, 0);
  window.scrollTo({top:0, behavior:'smooth'});
  render();
}

/* ---------------------------------------------------------------------
   MAIN RENDER DISPATCH
   --------------------------------------------------------------------- */
let lastRenderedStep = -1;
let isRendering = false; // re-entrancy guard — if anything ever triggers render() again
                          // while one is already in progress (e.g. a focus() call bouncing
                          // back into another event), this makes it a safe no-op instead of
                          // a runaway loop that freezes the tab.
function captureFocusSelector(){
  const el = document.activeElement;
  if(!el || el === document.body || !el.tagName) return null;
  if(el.id) return `#${el.id.replace(/[^a-zA-Z0-9_-]/g, m => '\\'+m)}`;
  const attrs = ['data-person-field','data-contact-field','data-eq-field','data-eq-item','data-eq-mode','data-hw-field','data-est-weight','data-nitrox-check','data-all-own-equip','data-person','data-dob-unit','data-dob-person','data-dob-contact','data-assign-activity','data-assign-person'];
  const parts = [];
  attrs.forEach(a=>{
    if(el.hasAttribute && el.hasAttribute(a)){
      const v = el.getAttribute(a).replace(/"/g,'\\"');
      parts.push(`[${a}="${v}"]`);
    }
  });
  if(!parts.length) return null;
  return el.tagName.toLowerCase() + parts.join('');
}
function restoreFocusSelector(selector){
  if(!selector) return;
  try{
    const el = document.querySelector(selector);
    if(el && el !== document.activeElement && typeof el.focus === 'function') el.focus({ preventScroll: true });
  } catch(e){ /* ignore invalid selector */ }
}
function render(){
  if(isRendering) return;
  isRendering = true;
  try{
    const focusSelector = captureFocusSelector();
    renderTideTracker();
    const app = document.getElementById('app');
    const renderers = [renderExperiencesStep, renderDatesStep, renderPeopleStep, renderReviewStep, renderDoneStep];
    app.innerHTML = renderers[state.step]();
    if(state.step !== lastRenderedStep){
      const panel = app.querySelector('.step-panel');
      if(panel) panel.classList.add('is-step-transition');
      lastRenderedStep = state.step;
    }
    attachStepHandlers();
    renderSelectionBar();
    requestAnimationFrame(syncBarPadding);
    restoreFocusSelector(focusSelector);
    applyTranslations();
    saveDraft();
  } finally {
    isRendering = false;
  }
}

function syncBarPadding(){
  const bar = document.getElementById('selectionBar');
  const app = document.getElementById('app');
  if(bar.classList.contains('is-visible')){
    app.style.paddingBottom = (bar.offsetHeight + 40) + 'px';
  } else {
    app.style.paddingBottom = '';
  }
}

  if(dn && typeof dn === 'object') return dn[l] || dn.en || a.name || '';
  return dn || a.name || ''; // legacy: displayName was a plain string, same for every language
}
function localizedField(a, field, lang){
  if(!a) return '';
  const val = a[field];
  const l = lang || (typeof state!=='undefined' ? state.pageLanguage : 'en') || 'en';
  if(val && typeof val === 'object' && !Array.isArray(val)) return val[l] || val.en || '';
  return val || ''; // legacy: plain string, same for every language
}
function localizedListField(a, field, lang){
  if(!a) return [];
  const val = a[field];
  const l = lang || (typeof state!=='undefined' ? state.pageLanguage : 'en') || 'en';
  if(val && typeof val === 'object' && !Array.isArray(val)) return val[l] || val.en || [];
  return Array.isArray(val) ? val : []; // legacy: plain array, same for every language
}
function priceAfterDiscount(a){
  if(!a.discount) return a.price;
  if(a.discount.type==='percent') return Math.round(a.price * (1 - a.discount.value/100));

}

  if(m < 0 || (m === 0 && TODAY.getDate() < d.getDate())) age--;
  return age;
}

   STEP 2 — DATES (one calendar per selected activity)
   ======================================================================= */
function isDateBlocked(activityId, dateObj){
  if(dateObj < TODAY || dateObj > MAX_DATE) return true;
  const blocked = state.availability[activityId] || [];
  return blocked.includes(fmtDate(dateObj));
}
function rangeHasBlockedDay(activityId, startISO, endISO){
  let cur = parseDate(startISO);
  const end = parseDate(endISO);
  while(cur <= end){
    if(isDateBlocked(activityId, cur)) return true;
    cur = new Date(cur.getFullYear(), cur.getMonth(), cur.getDate()+1);
  }
  return false;
}
function daysBetweenInclusive(startISO, endISO){
  return Math.round((parseDate(endISO) - parseDate(startISO)) / 86400000) + 1;
}
function perPersonPriceForBa(a, ba){
  const days = ba.date ? daysBetweenInclusive(ba.date, ba.endDate || ba.date) : 1;
  let total = priceAfterDiscount(a) * days;
  if(a.multiDayDiscount && a.multiDayDiscount.minDays && days >= a.multiDayDiscount.minDays){
    const md = a.multiDayDiscount;
    total = md.type === 'percent' ? Math.round(total * (1 - md.value/100)) : Math.max(0, total - md.value);
  }
  return total;
}
function fmtDateCompact(s){
  if(!s) return '';
  const d = parseDate(s);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}
function isSmallScreen(){ return window.innerWidth <= 480; }
function fmtBaDateRange(ba){
  if(!ba.date) return '';
  const fmt = isSmallScreen() ? fmtDateCompact : fmtDateHuman;
  if(ba.endDate) return `${fmt(ba.date)} → ${fmt(ba.endDate)} (${daysBetweenInclusive(ba.date, ba.endDate)} days)`;
  return fmt(ba.date);
}

/* Multiday selection: click one day = single-day booking. Click a second,
   different day = that pair becomes a date range (order doesn't matter,
   we sort them). Click a third day = the previous pair is discarded and
   that day becomes the new lone selection, ready to pair with a fourth. */
function getCalPending(activityId, ba){
  if(!state.calPending[activityId]){
    if(ba.endDate) state.calPending[activityId] = [ba.date, ba.endDate];
    else if(ba.date) state.calPending[activityId] = [ba.date];
    else state.calPending[activityId] = [];
  }
  return state.calPending[activityId];
}
function handleCalendarDayClick(activityId, iso){
  const ba = state.bookingActivities.find(b=>b.activityId===activityId);
  if(!ba) return;
  let pending = getCalPending(activityId, ba);

  if(pending.length >= 2){
    pending = [iso];
  } else if(pending.length === 1){
    if(pending[0] === iso){ pending = []; }
    else { pending = [pending[0], iso]; }
  } else {
    pending = [iso];
  }

  if(pending.length === 2){
    const sorted = [...pending].sort();
    if(rangeHasBlockedDay(activityId, sorted[0], sorted[1])){
      showToast('That range includes an unavailable date — pick two different days.');
      pending = [iso]; // keep the latest click as a fresh start
    }
  }

  state.calPending[activityId] = pending;
  if(pending.length === 0){ ba.date = null; ba.endDate = null; }
  else if(pending.length === 1){ ba.date = pending[0]; ba.endDate = null; }
  else { const sorted = [...pending].sort(); ba.date = sorted[0]; ba.endDate = sorted[1]; }
  render();
}

function renderCalendar(activityId, ba){
  if(!state.calCursor[activityId]){
    const base = ba.date ? parseDate(ba.date) : TODAY;
    state.calCursor[activityId] = { y: base.getFullYear(), m: base.getMonth() };
  }
  const { y, m } = state.calCursor[activityId];
  const first = new Date(y, m, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const monthLabel = first.toLocaleDateString('en-US', {month:'long', year:'numeric'});

  const nextMonthDate = new Date(y, m+1, 1);
  const canGoPrev = new Date(y, m, 1) > new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
  const canGoNext = nextMonthDate <= MAX_DATE;

  let cells = '';
  const dows = ['S','M','T','W','T','F','S'];
  cells += dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<startDow;i++) cells += `<div class="cal-day out-range"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateObj = new Date(y,m,d);
    const iso = fmtDate(dateObj);
    const blocked = isDateBlocked(activityId, dateObj);
    const isPast = dateObj < TODAY;
    const isToday = fmtDate(dateObj) === fmtDate(TODAY);
    const isStart = iso === ba.date;
    const isEnd = ba.endDate && iso === ba.endDate;
    const isInRange = ba.endDate && iso > ba.date && iso < ba.endDate;
    let cls = 'cal-day ';
    if(blocked) cls += isPast ? 'disabled' : 'unavailable';
    else cls += 'available';
    if(isStart || isEnd) cls += ' selected';
    if(isInRange) cls += ' in-range';
    if(isToday) cls += ' today';
    const isRealRange = ba.endDate && ba.endDate !== ba.date;
    const arrow = (isStart && isRealRange) ? '<span class="cal-day-arrow">→</span>' : (isEnd && isRealRange) ? '<span class="cal-day-arrow">←</span>' : '';
    cells += `<button type="button" class="${cls}" ${blocked?'disabled':''} data-cal-day="${iso}" data-cal-activity="${activityId}">${d}${arrow}</button>`;
  }

  return `
  <div class="cal-grid-wrap">
    <div class="cal-head">
      <button data-cal-nav="prev" data-cal-activity="${activityId}" ${canGoPrev?'':'disabled'} aria-label="Previous month">‹</button>
      <div class="cal-month-label">${monthLabel}</div>
      <button data-cal-nav="next" data-cal-activity="${activityId}" ${canGoNext?'':'disabled'} aria-label="Next month">›</button>
    </div>
    <div class="cal-grid">${cells}</div>
    <p style="font-size:12px; color:var(--ink-soft); margin-top:10px;" tr="Click one day for a single-day booking, or click two days to select a date range.">Click one day for a single-day booking, or click two days to select a date range.</p>
    <div class="cal-legend">
      <span><span class="legend-dot" style="background:var(--sand); border:1px solid var(--line);"></span><span tr="Available">Available</span></span>
      <span><span class="legend-dot" style="background:var(--err-bg);"></span><span tr="Unavailable">Unavailable</span></span>
      <span><span class="legend-dot" style="background:var(--coral);"></span><span tr="Selected">Selected</span></span>
    </div>
  </div>`;
}

/* ---- Returning-client lookup ------------------------------------- */
const _clientHistoryChecksInFlight = new Set();
async function checkClientHistory(personId, email){
  if(!email || !email.includes('@')) return;
  const flightKey = personId + '|' + email.toLowerCase();
  if(_clientHistoryChecksInFlight.has(flightKey)) return; // already checking this exact email — skip
  _clientHistoryChecksInFlight.add(flightKey);
  try{
    const db = await storeGet(SK.clients, true) || {};
    const rec = db[email.toLowerCase()];
    const p = state.people.find(x=>x.id===personId);
    if(!p) return;
    if(rec && rec.history && rec.history.length){
      const latest = rec.history[rec.history.length-1];
      p._welcomeBack = { date: latest.date };
    } else {
      p._welcomeBack = null;
    }
    render();
  } finally {
    _clientHistoryChecksInFlight.delete(flightKey);
  }
}
function applySavedDetails(personId){
  storeGet(SK.clients, true).then(db=>{
    db = db || {};
    const p = state.people.find(x=>x.id===personId);
    if(!p) return;
    const rec = db[p.email.toLowerCase()];
    if(!rec || !rec.history.length) return;
    const latest = rec.history[rec.history.length-1];
    const snap = latest.snapshot;
    Object.assign(p, snap, { id: p.id, email: p.email, _welcomeBack: p._welcomeBack });
    const idx = state.people.indexOf(p);
    if(idx===0 && state.sameAsFirst) Object.assign(state.mainContact, contactFieldsOf(p));
    showToast('Filled in your saved details — feel free to edit anything.');
    render();
  });
}

function formatFinSizeValue(val){
  // val is "Men:M" or "Women:S" etc — expand to the full EU/MX/US line.
  if(!val) return '';
  const [label, code] = val.split(':');
  const table = label === 'Women' ? FIN_CHART.Female : FIN_CHART.Male;
  const row = table.find(r=>r[0]===code);
  if(!row) return val;
  return `${label} ${code} — EU ${row[1]} · MX ${row[2]} · US ${row[3]}`;
}
function finSizeOptionsForGender(gender, currentVal){
  const g = gender;
  const buildRows = (label, table)=> table.map(r=>{

    return `<option value="${val}" ${currentVal===val?'selected':''}>${r[0]} — EU ${r[1]} · MX ${r[2]} · US ${r[3]}</option>`;
  }).join('');
  if(g === 'Male') return buildRows('Men', FIN_CHART.Male);
  if(g === 'Female') return buildRows('Women', FIN_CHART.Female);
  return `<option value="" disabled tr="Select gender above first">Select gender above first</option>`;

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function dobPartsFromISO(iso){
  if(!iso) return {y:'',m:'',d:''};
  const [y,m,d] = iso.split('-');
  return { y: y||'', m: m?String(Number(m)):'', d: d?String(Number(d)):'' };
}
function composeDob(y,m,d){
  if(!y || !m || !d) return '';
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function renderDobSelects(target, targetAttr, idPrefix){
  // Hydrate transient day/month/year parts from a stored ISO date the
  // first time we see it (e.g. loaded from a draft or a returning
  // client's saved profile) — after that, the three parts are the
  // source of truth so a half-finished selection is never lost on
  // re-render (this was the bug: deriving parts from `dob` every
  // render wiped out picks made before all three fields were set).
  if((!target.dobDay && !target.dobMonth && !target.dobYear) && target.dob){
    const parts = dobPartsFromISO(target.dob);
    target.dobDay = parts.d; target.dobMonth = parts.m; target.dobYear = parts.y;
  }
  const d = target.dobDay || '', m = target.dobMonth || '', y = target.dobYear || '';
  const curYear = TODAY.getFullYear();
  const minYear = curYear - 100;
  const dayOpts = ['<option value="" tr="Day">Day</option>'].concat(
    Array.from({length:31}, (_,i)=>i+1).map(i=>`<option value="${i}" ${Number(d)===i?'selected':''}>${i}</option>`)
  ).join('');
  const monthOpts = ['<option value="" tr="Month">Month</option>'].concat(
    MONTH_NAMES.map((mn,idx)=>`<option value="${idx+1}" ${Number(m)===idx+1?'selected':''} tr="${mn}">${mn}</option>`)
  ).join('');
  const yearOpts = ['<option value="" tr="Year">Year</option>'].concat(
    Array.from({length:curYear-minYear+1}, (_,i)=>curYear-i).map(yy=>`<option value="${yy}" ${Number(y)===yy?'selected':''}>${yy}</option>`)
  ).join('');
  const p = idPrefix || 'dob';
  return `<div class="dob-row">
    <select id="${p}_day" ${targetAttr} data-dob-unit="day">${dayOpts}</select>
    <select id="${p}_month" ${targetAttr} data-dob-unit="month">${monthOpts}</select>
    <select id="${p}_year" ${targetAttr} data-dob-unit="year">${yearOpts}</select>
  </div>`;
}

function isItemComplete(it, hasSize){

  return (p.items.bcd.mode==='rent' && p.items.bcd.size==='unknown') || (p.items.wetsuit.mode==='rent' && p.items.wetsuit.size==='unknown');

function equipmentFullyComplete(p){
  for(const def of visibleEquipItems()){
    if(!isItemComplete(p.items[def.key], def.hasSize)) return false;
  }
  if(needsSharedHWFor(p) && (!p.heightWeight.height || !p.heightWeight.weight)) return false;
  return true;
}
function personProgress(p, idx){
  const required = requiredFieldsForIndex(idx);
  const done = required.filter(f=> String(p[f]||'').trim() !== '').length;

  return { done: done + equipDone, total: required.length + 1 };
}

  const prog = personProgress(p, idx);
  return prog.done === prog.total;
}

function ensureAssignmentsDefault(){
  state.bookingActivities.forEach(ba=>{
    if(!state.clientAssignments[ba.activityId]){
      state.clientAssignments[ba.activityId] = state.people.map(p=>p.id);
    } else {
      // drop assignments for people who no longer exist
      const validIds = state.people.map(p=>p.id);
      state.clientAssignments[ba.activityId] = state.clientAssignments[ba.activityId].filter(id=>validIds.includes(id));
    }
  });
}

function activityTimeRangeMinutes(a){
  if(!a || !a.meetupTime) return null;
  const [h,m] = a.meetupTime.split(':').map(Number);
  const start = h*60 + m;
  const durationMin = (a.durationHours ? Number(a.durationHours) : 4) * 60;
  return { start, end: start + durationMin };
}
function baDateRangeSet(ba){
  if(!ba.date) return null;
  const start = parseDate(ba.date), end = parseDate(ba.endDate || ba.date);
  return { start, end };
}
function datesOverlap(ba1, ba2){
  const r1 = baDateRangeSet(ba1), r2 = baDateRangeSet(ba2);
  if(!r1 || !r2) return false;
  return r1.start <= r2.end && r2.start <= r1.end;
}
function activitiesTimeConflict(a1, a2){
  const t1 = activityTimeRangeMinutes(a1), t2 = activityTimeRangeMinutes(a2);
  if(!t1 || !t2) return true; // can't verify either activity's schedule is clear — be cautious and treat as a conflict
  return t1.start < t2.end && t2.start < t1.end;
}
function toggleClientAssignment(activityId, personId){
  const list = state.clientAssignments[activityId] || [];
  const i = list.indexOf(personId);
  if(i>-1){ list.splice(i,1); state.clientAssignments[activityId] = list; render(); return; }

  // Adding this person — check they're not already booked on an overlapping activity that day.
  const a = activityById(activityId);
  const ba = state.bookingActivities.find(x=>x.activityId===activityId);
  if(a && ba){
    for(const otherBa of state.bookingActivities){
      if(otherBa.activityId === activityId) continue;
      const otherAssigned = state.clientAssignments[otherBa.activityId] || [];
      if(!otherAssigned.includes(personId)) continue;
      if(!datesOverlap(ba, otherBa)) continue;
      const otherActivity = activityById(otherBa.activityId);
      if(activitiesTimeConflict(a, otherActivity)){
        const p = state.people.find(x=>x.id===personId);
        showToast(`${personDisplayName(p, state.people.indexOf(p))} is already booked on ${activityDisplayName(otherActivity)} at an overlapping time that day.`);
        return;
      }
    }
  }
  list.push(personId);
  state.clientAssignments[activityId] = list;
  render();
}

function activityCost(ba){
  const a = activityById(ba.activityId);
  const count = (state.clientAssignments[ba.activityId]||[]).length;
  return perPersonPriceForBa(a, ba) * count;
}
function totalDaysForPerson(personId){
  return state.bookingActivities.reduce((sum,ba)=>{
    const assigned = state.clientAssignments[ba.activityId]||[];
    if(!assigned.includes(personId)) return sum;
    const days = ba.date ? daysBetweenInclusive(ba.date, ba.endDate||ba.date) : 1;
    return sum + days;
  }, 0);
}
function equipmentCostForPerson(p){
  const days = totalDaysForPerson(p.id);
  if(days<=0) return 0;
  const rentedCount = visibleEquipItems().filter(def => p.items[def.key] && p.items[def.key].mode==='rent').length;
  if(rentedCount >= 4 && state.settings.equipmentPricing.fullSetPrice){
    return state.settings.equipmentPricing.fullSetPrice * days;
  }
  let cost = 0;
  visibleEquipItems().forEach(def=>{
    const it = p.items[def.key];
    if(it && it.mode==='rent') cost += (state.settings.equipmentPricing[def.key]||0) * days;
  });
  return cost;
}
function equipmentRentalBreakdown(){
  const byItem = {};
  let fullSetCount = 0, fullSetCost = 0, fullSetDays = 0;
  state.people.forEach(p=>{
    const days = totalDaysForPerson(p.id);
    if(days<=0) return;
    const rentedDefs = visibleEquipItems().filter(def => p.items[def.key] && p.items[def.key].mode==='rent');
    if(rentedDefs.length >= 4 && state.settings.equipmentPricing.fullSetPrice){
      fullSetCount += 1;
      fullSetCost += state.settings.equipmentPricing.fullSetPrice * days;
      fullSetDays += days;
      return;
    }
    rentedDefs.forEach(def=>{
      if(!byItem[def.key]) byItem[def.key] = { count:0, cost:0, days:0, label:def.label };
      byItem[def.key].count += 1;
      byItem[def.key].cost += (state.settings.equipmentPricing[def.key]||0) * days;
      byItem[def.key].days += days;
    });
  });
  if(fullSetCount > 0) byItem.fullSet = { count: fullSetCount, cost: fullSetCost, days: fullSetDays, label: 'Full equipment set (4+ items)' };
  return byItem;
}
function equipmentGrandTotal(){ return state.people.reduce((s,p)=>s+equipmentCostForPerson(p),0); }
function nitroxCostForPerson(p){
  if(!p.nitrox) return 0;
  return state.bookingActivities.reduce((sum,ba)=>{
    const a = activityById(ba.activityId);
    if(!a || !a.nitroxAvailable) return sum;
    const assigned = state.clientAssignments[ba.activityId]||[];
    if(!assigned.includes(p.id)) return sum;
    const days = ba.date ? daysBetweenInclusive(ba.date, ba.endDate||ba.date) : 1;
    const tanks = (a.tanksPerDay||1) * days;
    return sum + tanks * (a.nitroxPricePerTank||200);
  }, 0);
}
function nitroxGrandTotal(){ return state.people.reduce((s,p)=>s+nitroxCostForPerson(p),0); }
function grandTotal(){
  return state.bookingActivities.reduce((s,ba)=>s+activityCost(ba),0) + equipmentGrandTotal() + nitroxGrandTotal();
}
function computeSuggestedDeposit(total){ return Math.round(Math.min(total * 0.15, 4000)); }
const LANGUAGE_NATIVE_NAMES = { en:'English', es:'Español', fr:'Français', jp:'日本語', pt:'Português' };
function languageNativeName(code){ return LANGUAGE_NATIVE_NAMES[code] || LANGUAGE_NATIVE_NAMES.en; }
function personActivityIds(p){
  return state.bookingActivities.filter(ba => (state.clientAssignments[ba.activityId]||[]).includes(p.id)).map(ba=>ba.activityId);
}
function personTotalCost(p){
  const activitiesCost = state.bookingActivities.reduce((sum,ba)=>{
    if(!(state.clientAssignments[ba.activityId]||[]).includes(p.id)) return sum;
    const a = activityById(ba.activityId);
    return sum + perPersonPriceForBa(a, ba);
  }, 0);
  return activitiesCost + equipmentCostForPerson(p) + nitroxCostForPerson(p);
}
function personSummaryLine(p){
  const actIds = personActivityIds(p);
  const numExperiences = actIds.length;
  const days = totalDaysForPerson(p.id);
  const numRentals = visibleEquipItems().filter(def => p.items[def.key] && p.items[def.key].mode==='rent').length;
  const total = personTotalCost(p);
  if(numExperiences === 0) return `No experiences assigned yet = ${fmtMoneyLong(total)}`;
  const label = numExperiences === 1 ? activityDisplayName(activityById(actIds[0])) : `${numExperiences} Experiences`;
  const rentalsPart = numRentals > 0 ? ` and ${numRentals} rental${numRentals!==1?'s':''}` : '';
  return `${label} for ${days} day${days!==1?'s':''}${rentalsPart} = ${fmtMoneyLong(total)}`;
}

function equipmentItemSummary(key, it){
  if(key==='fins' && it.size) return formatFinSizeValue(it.size);
  if(it.size && it.size!=='unknown') return it.size;
  return null; // size shown separately via the shared height/weight line
}
function equipmentSummaryLine(p){
  const labels = { bcd:'BCD', computer:'Dive computer', fins:'Fins', mask:'Mask', regulator:'Regulator', wetsuit:'Wetsuit' };
  const parts = visibleEquipItems().map(def=>{
    const it = p.items[def.key];
    if(!it || it.mode !== 'rent') return null; // only rental items shown here — own gear isn't listed
    const sizeText = equipmentItemSummary(def.key, it);
    return sizeText ? `${labels[def.key]} (${sizeText})` : labels[def.key];
  }).filter(Boolean);
  const needsSharedHW = (p.items.bcd.mode==='rent' && p.items.bcd.size==='unknown') || (p.items.wetsuit.mode==='rent' && p.items.wetsuit.size==='unknown');
  if(needsSharedHW && p.heightWeight && (p.heightWeight.height || p.heightWeight.weight)){
    parts.push(`H/W: ${p.heightWeight.height}${p.heightWeight.heightUnit||''} / ${p.heightWeight.weight}${p.heightWeight.weightUnit||''}`);
  }
  if(p.nitrox) parts.push('Nitrox');
  return parts.length ? parts.join(', ') : '—';
}

/* =======================================================================
   VALIDATION — "take the page to where info is missing and mark it"
   ======================================================================= */
function clearFieldError(el){ el.classList.remove('field-error'); const m=el.querySelector('.field-error-msg'); if(m) m.classList.add('hidden'); }
function markFieldError(el){ el.classList.add('field-error'); const m=el.querySelector('.field-error-msg'); if(m) m.classList.remove('hidden'); }

function validateDatesStep(){
  document.querySelectorAll('.dates-activity-block').forEach(el=>el.classList.remove('missing-date'));
  const missing = state.bookingActivities.find(ba=>!ba.date);
  if(missing){
    const el = document.querySelector(`[data-dates-block="${missing.activityId}"]`);
    if(el){ el.classList.add('missing-date'); el.scrollIntoView({behavior:'smooth', block:'center'}); }
    showToast('Please choose a date for every experience.');
    return false;
  }
  return true;
}

function validatePeopleStep(){
  // Main contact (only when it's a separate card) — behaves like traveler 1.
  if(!state.sameAsFirst){
    const card = document.querySelector('[data-main-contact-card]');
    if(card){
      let ok = true; let firstBad = null;
      MAIN_CONTACT_REQUIRED.forEach(f=>{
        const wrap = card.querySelector(`[data-field-key="${f}"]`);
        if(!wrap) return;
        clearFieldError(wrap);
        if(String(state.mainContact[f]||'').trim()===''){ markFieldError(wrap); ok=false; if(!firstBad) firstBad=wrap; }
      });
      if(!ok){ firstBad.scrollIntoView({behavior:'smooth', block:'center'}); showToast('Please complete the main contact\'s required fields.'); return false; }
    }
  }
  // Each traveler
  for(let i=0;i<state.people.length;i++){
    const p = state.people[i];
    const card = document.querySelector(`[data-person-card="${p.id}"]`);
    if(!card) continue;
    let ok = true; let firstBad = null;
    requiredFieldsForIndex(i).forEach(f=>{
      const wrap = card.querySelector(`[data-field-key="${f}"]`);
      if(!wrap) return;
      clearFieldError(wrap);
      if(String(p[f]||'').trim()===''){ markFieldError(wrap); ok=false; if(!firstBad) firstBad=wrap; }
    });
    visibleEquipItems().forEach(def=>{
      const wrap = card.querySelector(`[data-field-key="eq_${def.key}"]`);
      if(wrap) clearFieldError(wrap);
      if(!isItemComplete(p.items[def.key], def.hasSize)){
        ok = false;
        if(wrap){ markFieldError(wrap); if(!firstBad) firstBad=wrap; }
      }
    });
    const needsSharedHW = (p.items.bcd.mode==='rent' && p.items.bcd.size==='unknown') || (p.items.wetsuit.mode==='rent' && p.items.wetsuit.size==='unknown');
    if(needsSharedHW){
      const hwWrap = card.querySelector('[data-field-key="heightWeight"]');
      if(hwWrap) clearFieldError(hwWrap);
      if(!p.heightWeight.height || !p.heightWeight.weight){
        ok = false;
        if(hwWrap){ markFieldError(hwWrap); if(!firstBad) firstBad=hwWrap; }
      }
    }
    if(!ok){
      state.collapsed[p.id] = false;
      card.classList.remove('is-collapsed');
      card.classList.add('is-invalid');
      (firstBad || card).scrollIntoView({behavior:'smooth', block:'center'});
      showToast(`Please complete the required information for ${personDisplayName(p,i)}.`);
      return false;
    }
  }
  return true;
}

function validateCurrentStep(){
  if(state.step === 1) return validateDatesStep();
  if(state.step === 2) return validatePeopleStep();
  return true;
}

/* =======================================================================
   BOOKING CONFIRMATION (submits into the shared "database")
   ======================================================================= */
function generateBookingCode(){
  const y = TODAY.getFullYear();
  const rand = Math.random().toString(36).slice(2,7).toUpperCase();
  return `HDS-${y}-${rand}`;
}

async function handleConfirmBooking(){
  if(!validatePeopleStep()){ goToStep(2); return; }
  if(!validateDatesStep()){ goToStep(1); return; }
  ensureAssignmentsDefault();

  const code = generateBookingCode();
  const booking = {
    id: uid('bk'), bookingCode: code, createdAt: new Date().toISOString(), status: 'pending',
    pageLanguage: state.pageLanguage,
    sameAsFirst: state.sameAsFirst,
    mainContact: state.sameAsFirst ? contactFieldsOf(state.people[0]) : { ...state.mainContact },
    people: JSON.parse(JSON.stringify(state.people)),
    activities: state.bookingActivities.map(ba => ({
      activityId: ba.activityId, date: ba.date, endDate: ba.endDate || null,
      assignedPersonIds: (state.clientAssignments[ba.activityId]||[]).slice(),
      unitPrice: perPersonPriceForBa(activityById(ba.activityId), ba)
    })),
    total: grandTotal(),
    deposit: 0,
    suggestedDeposit: computeSuggestedDeposit(grandTotal()),
    notifyAllEmails: !!state.notifyAllEmails,
  };

  const bookings = await storeGet(SK.bookings, true) || [];
  bookings.push(booking);
  await storeSet(SK.bookings, bookings, true);

  // Merge into the client database — keyed by email, history is
  // append-only so a returning client's older visits are preserved.
  const db = await storeGet(SK.clients, true) || {};
  const firstDate = booking.activities[0] ? booking.activities[0].date : todayISO();
  state.people.forEach(p=>{
    if(!p.email) return;
    const key = p.email.toLowerCase();
    if(!db[key]) db[key] = { history: [] };
    db[key].history.push({ date: firstDate, bookingCode: code, snapshot: JSON.parse(JSON.stringify(p)) });
  });
  await storeSet(SK.clients, db, true);

  state.bookingCode = code;
  state.step = 4;
  state.furthestStepReached = 4;
  window.scrollTo({top:0, behavior:'smooth'});
  render();
  showToast('Booking request sent — confirmation is pending.');
}

   these listeners live on stable ancestors.

function refreshPersonCardStyle(personId){
  const p = state.people.find(x=>x.id===personId);
  const card = document.querySelector(`[data-person-card="${personId}"]`);
  if(!p || !card) return;
  const idx = state.people.indexOf(p);
  const complete = isPersonComplete(p, idx);
  const prog = personProgress(p, idx);
  card.classList.toggle('is-complete', complete);
  card.classList.remove('is-invalid');
  const statusEl = card.querySelector('.person-status');
  if(statusEl){
    statusEl.classList.toggle('ok', complete);
    statusEl.classList.toggle('pending', !complete);
    const labelEl = statusEl.querySelector('[tr]');
    if(labelEl){ labelEl.textContent = complete ? '✓ Complete' : 'Incomplete'; labelEl.setAttribute('tr', complete ? 'Complete' : 'Incomplete'); }
    const countEl = statusEl.querySelector('.person-progress-count');
    if(countEl) countEl.textContent = `${prog.done} of ${prog.total} items`;
  }
  const titleEl = card.querySelector('.person-title');
  if(titleEl && idx === 0 && state.sameAsFirst){
    // name display can change live as they type — handled by focusout/input already via full text nodes; skip re-render here to avoid clobbering the MAIN CONTACT badge markup.
  }
}
function refreshEquipmentSection(personId){
  const p = state.people.find(x=>x.id===personId);
  const idx = state.people.indexOf(p);
  const container = document.querySelector(`[data-equip-section="${personId}"]`);
  if(!p || idx === -1 || !container){ render(); return; } // fallback if something's out of sync
  const focusSelector = captureFocusSelector();
  container.innerHTML = renderEquipmentSection(p, idx);
  restoreFocusSelector(focusSelector);
  applyTranslations();
  refreshPersonCardStyle(personId);
  saveDraft();
}
function refreshMainContactCardStyle(){
  const card = document.querySelector('[data-main-contact-card]');
  if(!card) return;
  const complete = MAIN_CONTACT_REQUIRED.every(f=>String(state.mainContact[f]||'').trim()!=='');
  card.classList.toggle('is-complete', complete);
}


function initGlobalListeners(){
  window.addEventListener('resize', ()=> requestAnimationFrame(syncBarPadding));

  const app = document.getElementById('app');

  // ---- CLICK ----
  document.addEventListener('click', (e)=>{
    const t = e.target;

    const btnToggleEl = t.closest('[data-btn-toggle]');
    if(btnToggleEl){
      const p = state.people.find(x=>x.id===btnToggleEl.dataset.person);
      if(p){
        setNestedPersonField(p, btnToggleEl.dataset.btnToggle, btnToggleEl.dataset.btnValue);
        refreshEquipmentSection(p.id);
      }
      return;
    }

    const addTravelerChip = t.closest('[data-add-traveler-chip]');
    if(addTravelerChip){ addPerson(); return; }

    const collapsePersonBtn = t.closest('[data-collapse-person]');
    if(collapsePersonBtn){
      state.collapsed[collapsePersonBtn.dataset.collapsePerson] = true;
      render();
      return;
    }

    const focusTravelerBtn = t.closest('[data-focus-traveler]');
    if(focusTravelerBtn){
      const targetId = focusTravelerBtn.dataset.focusTraveler;
      state.people.forEach(p=>{ state.collapsed[p.id] = p.id !== targetId; });
      render();
      setTimeout(()=>{
        document.querySelector(`[data-person-card="${targetId}"]`)?.scrollIntoView({behavior:'smooth', block:'start'});
      }, 60);
      return;
    }

    const selectBtn = t.closest('[data-select-activity]');
    if(selectBtn){ toggleActivitySelection(selectBtn.dataset.selectActivity); return; }

    const moreInfoBtn = t.closest('[data-more-info]');
    if(moreInfoBtn){ showMoreInfoModal(moreInfoBtn.dataset.moreInfo); return; }

    const removeSel = t.closest('[data-remove-selection]');
    if(removeSel){ const id=removeSel.dataset.removeSelection; state.selectedActivityIds = state.selectedActivityIds.filter(x=>x!==id); render(); return; }

    if(t.id === 'bookBtn'){
      if(state.step === 0) handleBookClick();
      else if(state.step === 1) nextStep();
      else if(state.step === 2) nextStep();
      else if(state.step === 3) handleConfirmBooking();
      return;
    }
    if(t.id === 'barBackBtn'){ prevStep(); return; }

    const removeBookingAct = t.closest('[data-remove-booking-activity]');
    if(removeBookingAct){
      const id = removeBookingAct.dataset.removeBookingActivity;
      state.bookingActivities = state.bookingActivities.filter(ba=>ba.activityId!==id);
      state.selectedActivityIds = state.selectedActivityIds.filter(x=>x!==id);
      render(); return;
    }

    const gotoBtn = t.closest('[data-goto-step]');
    if(gotoBtn){ goToStep(Number(gotoBtn.dataset.gotoStep)); return; }
    const modifyBtn = t.closest('[data-modify-step]');
    if(modifyBtn){ goToStep(Number(modifyBtn.dataset.modifyStep)); return; }

    const calNav = t.closest('[data-cal-nav]');
    if(calNav){
      const actId = calNav.dataset.calActivity;
      const cur = state.calCursor[actId];
      let { y, m } = cur;
      if(calNav.dataset.calNav==='prev'){ m--; if(m<0){m=11;y--;} } else { m++; if(m>11){m=0;y++;} }
      state.calCursor[actId] = { y, m };
      render(); return;
    }
    const calDay = t.closest('[data-cal-day]');
    if(calDay && !calDay.disabled){
      handleCalendarDayClick(calDay.dataset.calActivity, calDay.dataset.calDay);
      return;
    }


    const toggleCollapse = t.closest('[data-toggle-collapse]');
    if(toggleCollapse && !t.closest('[data-delete-person]')){ togglePersonCollapsed(toggleCollapse.dataset.toggleCollapse); return; }

    const delBtn = t.closest('[data-delete-person]');
    if(delBtn){ e.stopPropagation(); deletePerson(delBtn.dataset.deletePerson); return; }

    if(t.id === 'addPersonBtn'){ addPerson(); return; }

    const applySaved = t.closest('[data-apply-saved]');
    if(applySaved){ applySavedDetails(applySaved.dataset.applySaved); return; }


    if(t.id === 'previewEmailBtn'){
      showModal(`
        <button class="icon-btn modal-close-float" onclick="closeModal()" aria-label="Close" tr="✕">✕</button>
        ${buildResumeHtml('Confirmation is pending', 'warn', false)}
      `);
      return;
    }
    if(t.id === 'startOverBtn'){
      state.selectedActivityIds = []; state.bookingActivities = []; state.sameAsFirst = true;
      state.mainContact = emptyPerson(true); state.people = [emptyPerson(false)];
      state.clientAssignments = {}; state.collapsed = {}; state.bookingCode = null;
      state.step = 0; state.furthestStepReached = 0;
      render(); return;
    }
  });

  // ---- INPUT (live typing — update state + light style only) ----
  document.addEventListener('input', (e)=>{
    const t = e.target;
    if(t.matches('[data-person-field]')){
      updatePersonField(t.dataset.person, t.dataset.personField, t.value);
      refreshPersonCardStyle(t.dataset.person);
    } else if(t.matches('[data-contact-field]') && t.tagName !== 'SELECT'){
      updateContactField(t.dataset.contactField, t.value);
      refreshMainContactCardStyle();
    }
  });

  // ---- FOCUSOUT (commit — full re-render, safe since focus left) ----
  document.addEventListener('focusout', (e)=>{
    const t = e.target;
    if(t.matches('input[data-email-blur]')){
      checkClientHistory(t.dataset.emailBlur, t.value.trim());
      return;
    }
    // Lightweight refresh only — NOT a full render(). A full render()
    // here would destroy and rebuild the DOM synchronously during the
    // browser's Tab/blur sequence, which breaks keyboard tab order
    // (the element Tab was about to focus no longer exists by the time
    // the browser tries to move focus to it).
    if(t.matches('[data-person-field]')){
      refreshPersonCardStyle(t.dataset.person);
    } else if(t.matches('[data-contact-field]')){
      refreshMainContactCardStyle();
    }
  }, true);

  // ---- CHANGE (selects, checkboxes, radios, dates) ----
  document.addEventListener('change', (e)=>{
    const t = e.target;

    if(t.id === 'sameAsFirst'){ onToggleSameAsFirst(t.checked); return; }

    if(t.matches('[data-dob-unit]')){
      const row = t.closest('.dob-row');
      const day = row.querySelector('[data-dob-unit="day"]').value;
      const month = row.querySelector('[data-dob-unit="month"]').value;
      const year = row.querySelector('[data-dob-unit="year"]').value;
      const iso = composeDob(year, month, day);
      const target = t.hasAttribute('data-dob-person')
        ? state.people.find(x=>x.id===t.dataset.dobPerson)
        : state.mainContact;
      if(target){
        target.dobDay = day; target.dobMonth = month; target.dobYear = year;
        target.dob = iso;
        if(t.hasAttribute('data-dob-person')){
          const idx = state.people.indexOf(target);
          if(idx===0 && state.sameAsFirst) Object.assign(state.mainContact, contactFieldsOf(target));
        } else if(state.sameAsFirst && state.people[0]){
          Object.assign(state.people[0], contactFieldsOf(state.mainContact));
        }
      }
      render(); return;
    }

    if(t.matches('[data-person-field]')){
      updatePersonField(t.dataset.person, t.dataset.personField, t.value);
      if(t.dataset.personField === 'gender'){
        // Gender affects fin-size options within the equipment section.
        refreshEquipmentSection(t.dataset.person);
      } else {
        refreshPersonCardStyle(t.dataset.person);
      }
      return;
    }
    if(t.matches('[data-contact-field]')){
      updateContactField(t.dataset.contactField, t.value);
      render(); return;
    }
    if(t.matches('[data-eq-mode]')){
      const p = state.people.find(x=>x.id===t.dataset.person);
      if(p) p.items[t.dataset.eqItem].mode = t.dataset.eqMode;
      refreshEquipmentSection(t.dataset.person); return;
    }
    if(t.matches('[data-eq-field]')){
      const p = state.people.find(x=>x.id===t.dataset.person);
      if(p){
        const val = t.type === 'checkbox' ? t.checked : t.value;
        p.items[t.dataset.eqItem][t.dataset.eqField] = val;
      }
      refreshEquipmentSection(t.dataset.person); return;
    }
    if(t.matches('[data-hw-field]')){
      const p = state.people.find(x=>x.id===t.dataset.person);
      if(p) p.heightWeight[t.dataset.hwField] = t.value;
      return;
    }
    if(t.matches('[data-est-weight]')){
      const p = state.people.find(x=>x.id===t.dataset.person);
      if(p) p.estimatedWeight[t.dataset.estWeight] = t.value;
      return;
    }
    if(t.matches('[data-all-own-equip]')){
      const p = state.people.find(x=>x.id===t.dataset.allOwnEquip);
      if(p){
        visibleEquipItems().forEach(def=>{ p.items[def.key].mode = t.checked ? 'own' : ''; });
      }
      refreshEquipmentSection(t.dataset.allOwnEquip); return;
    }
    if(t.id === 'notifyAllEmailsCheck'){ state.notifyAllEmails = t.checked; return; }
    if(t.matches('[data-nitrox-check]')){
      const p = state.people.find(x=>x.id===t.dataset.person);
      if(p) p.nitrox = t.checked;
      return;
    }
    if(t.matches('[data-assign-activity]')){
      toggleClientAssignment(t.dataset.assignActivity, t.dataset.assignPerson); return;
    }
  });
}

function attachStepHandlers(){ /* no-op: listeners are delegated globally via initGlobalListeners() */ }

/* =======================================================================
   INIT
   ======================================================================= */
async function init(){
  const { activities, availability, settings } = await loadCatalog();
  state.activities = activities;
  state.availability = availability;
  state.settings = settings;

  const draft = await storeGet('hidrosfera:draft', false);
  if(draft){
    Object.assign(state, {
      pageLanguage: draft.pageLanguage ?? state.pageLanguage,
      selectedActivityIds: draft.selectedActivityIds ?? [],
      bookingActivities: draft.bookingActivities ?? [],
      sameAsFirst: draft.sameAsFirst ?? true,
      mainContact: draft.mainContact ?? state.mainContact,
      people: (draft.people && draft.people.length) ? draft.people : state.people,
      clientAssignments: draft.clientAssignments ?? {},
      furthestStepReached: draft.furthestStepReached ?? 0,
      notifyAllEmails: draft.notifyAllEmails ?? false,
    });
  }

  initGlobalListeners();

  // If arriving from the experience-detail-template page with ?activity=ID,
  // pre-select that activity on the grid.
  try{
    const params = new URLSearchParams(window.location.search);
    const preselect = params.get('activity');
    if(preselect && state.activities.some(a=>a.id===preselect) && !state.selectedActivityIds.includes(preselect)){
      state.selectedActivityIds.push(preselect);
    }
  } catch(e){}

  render();
}
init();

/* =====================================================================
   ---------------------------------------------------------------------
   OUT-OF-SCOPE INTEGRATION NOTES (for the developer wiring this up)
   ---------------------------------------------------------------------
   1. REAL EMAIL SENDING
      This prototype never sends real email — "sending" is simulated
      via the "Preview the email we sent" modal, which reuses the same
      legal-size template. To send for real:
        a. Stand up a tiny backend endpoint (Cloudflare Worker, AWS
           Lambda, or a Node/Express route) that accepts a booking
           payload and calls a transactional email API — Postmark,
           Resend, or SendGrid all support raw HTML bodies.
        b. On confirm, POST the `booking` object (see
           handleConfirmBooking) to that endpoint instead of / in
           addition to writing to storage.
        c. Server-side, render the SAME legal-sheet HTML (export
           buildResumeHtml as a shared template — e.g. a .ejs/.hbs
           file, or just reuse this JS in a Node context) into the
           email body. Add a "View this booking online" link pointing
           to a hosted, shareable version of the review page. No
           attachments, per the spec — just inline HTML + that link.
        d. Two sends are needed: (1) on customer submit → subject
           line should reflect "Confirmation is pending" status
           (already the first line of the template); (2) on admin
           confirm (phase 2 admin panel) → re-send with status
           "Confirmed" and, if a deposit was taken, an amount-due
           line reflecting the deposit.
        e. Never call the email API directly from this browser code
           — API keys can't be kept secret client-side.

   2. REAL DATABASE
      `window.storage` (used here for activities/availability/clients/
      bookings) is a convenient mock database scoped to this artifact.
      For production, replace storeGet/storeSet with calls to a real
      database (Postgres/Supabase/Firebase all work well) behind the
      same backend endpoint from note 1. The data shapes used here
      (see SEED_ACTIVITIES, the `booking` object in
      handleConfirmBooking, and the `clients` map) are meant to map
      directly onto real tables: activities, availability_blocks,
      bookings, booking_people, clients, client_visit_history.

   3. ADMIN PANEL (phase 2 — not built in this file)
      Already wired for it: activities/availability/settings are read
      from shared storage keys (SK.activities, SK.availability,
      SK.settings) with seed data written once. An admin UI can simply
      read/write those same keys (add/edit/deactivate activities, set
      per-date availability per activity, set the notification email)
      and this customer-facing app will pick up changes on next load.
      Booking status changes, deposits, calendar view, the client CRM,
      birthday reminders, discounts UI, and payments dashboard all
      read from SK.bookings / SK.clients the same way.

   4. PASSWORD-PROTECTED ADMIN AREA
      Do this server-side (e.g. a login route issuing a signed
      session cookie / JWT), not with a client-side password check —
      a password compared in browser JS is trivially bypassed by
      reading the page source.
   ===================================================================== */

function handleBookClick(){
  // Move selected activities into the "booking" set (step 2 works off this),
  // preserving any dates already chosen for activities kept from before.
  const existingByOldId = {}; state.bookingActivities.forEach(b=> existingByOldId[b.activityId]=b);
  state.bookingActivities = state.selectedActivityIds.map(id=>({
    activityId: id,
    date: existingByOldId[id] ? existingByOldId[id].date : null,
    endDate: existingByOldId[id] ? (existingByOldId[id].endDate || null) : null
  }));
  state.step = 1;
  state.furthestStepReached = Math.max(state.furthestStepReached, 1);
  window.scrollTo({top:0, behavior:'smooth'});
  render();
}
</script>

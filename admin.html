<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidrosfera — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Public+Sans:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --deep:#0B3D4C; --deep-2:#082B36; --teal:#1C7C82; --teal-lt:#2E9AA0;
  --sand:#EDE4D3; --sand-2:#E3D7C0; --foam:#FBFAF7; --coral:#E8734A; --coral-dk:#C85A34;
  --ink:#10262B; --ink-soft:#4A5D61; --line:#D9CEB8;
  --ok:#2E7D4F; --ok-bg:#E6F2EA; --warn:#B8860B; --warn-bg:#FBF3DD; --err:#C0392B; --err-bg:#FBEAE7;
  --gray:#6B7280; --gray-bg:#EEF0F2;
  --font-display:'Fraunces', serif; --font-body:'Public Sans', sans-serif; --font-mono:'IBM Plex Mono', monospace;
  --radius-s:8px; --radius-m:14px; --radius-l:22px;
  --shadow-card:0 1px 2px rgba(11,61,76,.06), 0 8px 24px rgba(11,61,76,.08);
  --shadow-pop:0 12px 40px rgba(11,61,76,.22);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{ font-family:var(--font-body); background:var(--sand); color:var(--ink); -webkit-font-smoothing:antialiased; min-height:100vh; }
h1,h2,h3,h4{ font-family:var(--font-display); font-weight:600; margin:0; color:var(--deep); }
p{margin:0;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{color:inherit;}
.hidden{display:none !important;}
.container{ max-width:1280px; margin:0 auto; padding:0 28px; }

/* ---- Login gate ---- */
.login-screen{ min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(160deg, var(--deep), var(--deep-2)); }
.login-card{ background:var(--foam); border-radius:var(--radius-l); padding:40px; width:100%; max-width:380px; box-shadow:var(--shadow-pop); text-align:center; }
.login-card .brand-mark{ width:44px; height:44px; margin-bottom:10px; }
.login-card h1{ font-size:22px; margin-bottom:6px; }
.login-card p{ font-size:13.5px; color:var(--ink-soft); margin-bottom:22px; }
.login-card input{ width:100%; border:1.5px solid var(--line); border-radius:var(--radius-s); padding:12px 14px; font-size:15px; margin-bottom:14px; }
.login-card input:focus{ outline:none; border-color:var(--teal); box-shadow:0 0 0 3px rgba(28,124,130,.15); }
.login-error{ color:var(--err); font-size:13px; margin-bottom:12px; min-height:16px; }
.login-hint{ font-size:11.5px; color:var(--ink-soft); margin-top:18px; line-height:1.6; }

/* ---- Shell ---- */
.masthead{ background:linear-gradient(180deg, var(--deep), var(--deep-2)); color:var(--foam); padding:18px 0; }
.masthead .container{ display:flex; align-items:center; justify-content:space-between; }
.brand{ display:flex; align-items:center; gap:12px; }
.brand-mark{ width:32px; height:32px; }
.brand-name{ font-family:var(--font-display); font-size:19px; }
.brand-tag{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--teal-lt); }
.masthead-right{ display:flex; align-items:center; gap:16px; font-size:13px; }
.masthead-right a, .masthead-right button{ color:var(--foam); background:none; border:1.5px solid rgba(255,255,255,.3); border-radius:999px; padding:7px 14px; font-size:12.5px; text-decoration:none; }
.masthead-right a:hover, .masthead-right button:hover{ border-color:#fff; }

.tabbar{ background:var(--foam); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:30; }
.tabbar .container{ display:flex; gap:4px; overflow-x:auto; }
.tab-btn{ background:none; border:none; padding:16px 18px; font-size:13.5px; font-weight:600; color:var(--ink-soft); border-bottom:3px solid transparent; white-space:nowrap; }
.tab-btn.active{ color:var(--deep); border-bottom-color:var(--coral); }
.tab-btn:hover{ color:var(--deep); }

main{ padding:32px 0 80px; }
.page-head{ display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:24px; flex-wrap:wrap; gap:14px; }
.page-title{ font-size:26px; }
.page-sub{ color:var(--ink-soft); font-size:13.5px; margin-top:4px; }

.card{ background:var(--foam); border-radius:var(--radius-l); box-shadow:var(--shadow-card); padding:22px; margin-bottom:20px; }
.stat-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
.stat-card{ background:var(--foam); border-radius:var(--radius-m); box-shadow:var(--shadow-card); padding:18px 20px; }
.stat-label{ font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--teal); margin-bottom:6px; }
.stat-value{ font-family:var(--font-display); font-size:26px; color:var(--deep); }
.stat-sub{ font-size:11.5px; color:var(--ink-soft); margin-top:3px; }

.btn{ border:none; border-radius:999px; padding:11px 20px; font-weight:700; font-size:13.5px; transition:transform .15s, background .2s, opacity .2s; }
.btn:active{ transform:scale(.97); }
.btn-primary{ background:var(--coral); color:#fff; }
.btn-primary:hover{ background:var(--coral-dk); }
.btn-outline{ background:transparent; color:var(--deep); border:1.5px solid var(--deep); }
.btn-outline:hover{ background:var(--deep); color:#fff; }
.btn-ghost{ background:none; color:var(--teal); }
.btn-ghost:hover{ text-decoration:underline; }
.btn-danger{ background:var(--err-bg); color:var(--err); border:1.5px solid transparent; }
.btn-danger:hover{ background:var(--err); color:#fff; }
.btn-sm{ padding:7px 14px; font-size:12.5px; }
.btn:disabled{ opacity:.4; cursor:not-allowed; }

.field{ display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
.field label{ font-size:12px; font-weight:600; color:var(--ink-soft); }
.field input, .field select, .field textarea{
  border:1.5px solid var(--line); background:#fff; border-radius:var(--radius-s); padding:10px 12px; font-size:14px; color:var(--ink);
  width:100%; box-sizing:border-box;
}
.field input:focus, .field select:focus, .field textarea:focus{ outline:none; border-color:var(--teal); box-shadow:0 0 0 3px rgba(28,124,130,.15); }
.field-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; }
.field textarea{ min-height:70px; resize:vertical; }

.badge{ font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; padding:4px 10px; border-radius:999px; font-weight:700; display:inline-block; }
.badge-pending{ background:var(--warn-bg); color:var(--warn); }
.badge-confirmed{ background:var(--ok-bg); color:var(--ok); }
.badge-cancelled{ background:var(--err-bg); color:var(--err); }
.badge-done{ background:var(--gray-bg); color:var(--gray); }

.status-select{ font-size:13px; padding:9px 14px; border-radius:999px; border:1.5px solid transparent; font-weight:700; cursor:pointer; }
.status-select-pending{ background:var(--warn-bg); color:var(--warn); border-color:var(--warn); }
.status-select-confirmed{ background:var(--ok-bg); color:var(--ok); border-color:var(--ok); }
.status-select-cancelled{ background:var(--err-bg); color:var(--err); border-color:var(--err); }
.status-select-done{ background:var(--gray-bg); color:var(--gray); border-color:var(--gray); }
.lg-row{ display:flex; justify-content:space-between; font-size:13.5px; padding:5px 0; border-bottom:1px dotted var(--line); gap:12px; }
.lg-row .k{ color:var(--ink-soft); }
.lg-row .v{ font-weight:600; text-align:right; }
.legal-sheet{ background:#fff; width:100%; max-width:700px; margin:0 auto; box-shadow:var(--shadow-card); border-radius:4px; overflow:hidden; font-family:var(--font-body); }
.legal-head{ background:linear-gradient(120deg,var(--deep),var(--deep-2)); color:#fff; padding:28px 34px; }
.legal-head .lg-brand{ font-family:var(--font-display); font-size:22px; }
.legal-head .lg-status{ font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; background:var(--warn-bg); color:var(--warn); display:inline-block; padding:5px 12px; border-radius:999px; margin-top:10px; }
.legal-body{ padding:26px 34px; }
.lg-section{ margin-bottom:22px; }
.lg-section-title{ font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--teal); border-bottom:1px solid var(--line); padding-bottom:8px; margin-bottom:12px; }
.lg-activity-card{ border:1px solid var(--line); border-radius:10px; padding:14px; margin-bottom:10px; }
.lg-activity-card-warn{ border-color:var(--err); background:var(--err-bg); }
.lg-activity-card h4{ font-size:14.5px; color:var(--deep); margin-bottom:6px; }
.lg-total-row{ display:flex; justify-content:space-between; font-size:18px; font-family:var(--font-display); color:var(--deep); padding-top:12px; border-top:2px solid var(--deep); margin-top:6px; }

table{ width:100%; border-collapse:collapse; font-size:13.5px; }
th{ text-align:left; font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); padding:10px 12px; border-bottom:2px solid var(--line); white-space:nowrap; }
td{ padding:12px; border-bottom:1px solid var(--line); vertical-align:middle; }
tr.table-row:hover{ background:rgba(28,124,130,.05); cursor:pointer; }

.toolbar{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:18px; }
.toolbar input, .toolbar select{ border:1.5px solid var(--line); border-radius:999px; padding:9px 16px; font-size:13px; background:#fff; }
.toolbar input:focus, .toolbar select:focus{ outline:none; border-color:var(--teal); }

.modal-backdrop{ position:fixed; inset:0; background:rgba(8,32,40,.55); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; overflow-y:auto; }
.modal-box{ background:#fff; border-radius:var(--radius-l); max-width:760px; width:100%; max-height:90vh; overflow-y:auto; padding:30px; box-shadow:var(--shadow-pop); position:relative; margin:auto; }
.modal-nav-row{ position:sticky; top:16px; display:flex; justify-content:space-between; margin-bottom:-32px; z-index:5; pointer-events:none; }
.modal-nav-row > button{ pointer-events:auto; background:var(--sand); border:none; width:32px; height:32px; border-radius:50%; font-size:15px; color:var(--deep); box-shadow:0 2px 8px rgba(11,61,76,.15); }
.modal-nav-row > button:only-child{ margin-left:auto; }

.toast{ position:fixed; top:20px; right:24px; background:var(--deep); color:#fff; padding:14px 20px; border-radius:var(--radius-s); box-shadow:var(--shadow-pop); z-index:300; font-size:14px; max-width:320px; animation:toastIn .3s ease; }
@keyframes toastIn{ from{opacity:0; transform:translateX(20px);} to{opacity:1; transform:translateX(0);} }

.checkbox-row{ display:flex; align-items:center; gap:8px; font-size:13.5px; }
.unit-toggle{ display:flex; gap:4px; }
.unit-toggle-btn{ border:1.5px solid var(--line); background:#fff; padding:0 10px; border-radius:6px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; flex:1; min-width:40px; }
.unit-toggle-btn input{ display:none; }
.unit-toggle-btn:has(input:checked){ background:var(--teal); color:#fff; border-color:var(--teal); font-weight:600; }
.checkbox-row input{ width:16px; height:16px; accent-color:var(--teal); }

/* Calendar (bookings + availability) */
.admin-cal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.admin-cal-head button{ background:var(--sand); border:none; width:34px; height:34px; border-radius:50%; font-size:16px; color:var(--deep); }
.admin-cal-title{ font-family:var(--font-display); font-size:20px; color:var(--deep); }
.admin-cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
.admin-cal-dow{ text-align:center; font-family:var(--font-mono); font-size:11px; color:var(--ink-soft); text-transform:uppercase; padding-bottom:6px; }
.admin-cal-day{ background:var(--foam); border-radius:10px; min-height:96px; padding:6px; border:1px solid var(--line); display:flex; flex-direction:column; gap:3px; }
.admin-cal-day.out-range{ background:transparent; border:none; }
.admin-cal-day.today{ border-color:var(--teal); box-shadow:0 0 0 2px rgba(28,124,130,.15) inset; }
.admin-cal-daynum{ font-family:var(--font-mono); font-size:11px; color:var(--ink-soft); }
.admin-cal-event{ font-size:10.5px; padding:3px 6px; border-radius:5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; }
.event-pending{ background:var(--warn-bg); color:#7a5c00; }
.event-confirmed{ background:var(--ok-bg); color:var(--ok); }
.event-cancelled{ background:var(--err-bg); color:var(--err); text-decoration:line-through; }
.event-done{ background:var(--gray-bg); color:var(--gray); }

@media (max-width:640px){
  body{ overflow-x:hidden; }
  .container{ padding:0 14px; }
  .tabbar-inner{ padding:0 14px; }
  .card{ padding:16px; }
  .admin-cal-grid{ gap:3px; }
  .admin-cal-day{ min-height:60px; padding:4px; border-radius:6px; gap:1px; }
  .admin-cal-daynum{ font-size:9.5px; }
  .admin-cal-event{ font-size:8px; padding:2px 3px; white-space:normal; line-height:1.15; }
  .admin-cal-title{ font-size:15px; }
  .admin-cal-head button{ width:28px; height:28px; font-size:14px; }
  .modal-box{ padding:18px; max-height:94vh; border-radius:var(--radius-m); }
  .modal-close-float{ top:10px; right:10px; }
  .stat-grid{ grid-template-columns:1fr 1fr; }
  table{ font-size:12px; }
}

.avail-day{ aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:8px; font-size:13px; background:var(--sand); border:none; color:var(--ink); }
.avail-day.blocked{ background:var(--err-bg); color:var(--err); text-decoration:line-through; }
.avail-day.past{ opacity:.3; cursor:not-allowed; }
.avail-day.out-range{ visibility:hidden; }

.activity-row{ display:flex; gap:16px; align-items:center; padding:14px; border-radius:var(--radius-m); border:1px solid var(--line); margin-bottom:10px; background:#fff; flex-wrap:wrap; }
.reorder-col{ display:flex; flex-direction:column; gap:2px; }
.reorder-col button{ background:var(--sand); border:none; width:24px; height:20px; border-radius:4px; font-size:9px; color:var(--deep); }
.reorder-col button:disabled{ opacity:.25; }
.activity-row .thumb{ width:56px; height:56px; border-radius:10px; background:linear-gradient(135deg,var(--deep),var(--teal)); display:flex; align-items:center; justify-content:center; font-size:24px; color:#fff; flex-shrink:0; background-size:cover; background-position:center; }
.activity-row .info{ flex:1; min-width:160px; }
.activity-row .info h4{ font-size:15px; }
.activity-row .info .meta{ font-size:12px; color:var(--ink-soft); font-family:var(--font-mono); margin-top:2px; }
.activity-row .actions{ display:flex; gap:8px; flex-shrink:0; flex-wrap:wrap; }
@media (max-width:640px){
  .activity-row{ flex-direction:column; align-items:stretch; }
  .reorder-col{ flex-direction:row; justify-content:center; }
  .reorder-col button{ width:32px; height:26px; }
  .activity-row .thumb{ width:100%; height:110px; }
  .activity-row .actions{ justify-content:stretch; }
  .activity-row .actions button{ flex:1; }
}
.pill-inactive{ background:var(--gray-bg); color:var(--gray); font-family:var(--font-mono); font-size:10px; padding:3px 9px; border-radius:999px; margin-left:8px; }

.client-card{ padding:14px 16px; border:1px solid var(--line); border-radius:var(--radius-m); background:#fff; margin-bottom:10px; }
.client-card h4{ font-size:14.5px; }
.client-card .meta{ font-size:12px; color:var(--ink-soft); margin-top:4px; }
.birthday-chip{ display:inline-flex; align-items:center; gap:8px; background:var(--warn-bg); color:#7a5c00; padding:8px 14px; border-radius:999px; font-size:13px; margin:4px 6px 4px 0; }

.bar-chart{ display:flex; align-items:flex-end; gap:10px; height:180px; padding-top:10px; }
.bar-chart-col{ flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; justify-content:flex-end; height:100%; }
.bar-chart-bar{ width:100%; background:linear-gradient(180deg,var(--teal-lt),var(--deep)); border-radius:6px 6px 0 0; min-height:2px; }
.bar-chart-label{ font-size:10px; color:var(--ink-soft); font-family:var(--font-mono); text-align:center; line-height:1.4; overflow-wrap:break-word; max-width:90px; }

/* Year-at-a-glance mini calendars */
.year-overview{ margin-top:26px; }
.year-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:16px; }
.mini-month{ background:var(--foam); border-radius:var(--radius-m); box-shadow:var(--shadow-card); padding:14px; cursor:pointer; border:2px solid transparent; transition:box-shadow .2s ease, transform .15s ease; }
.mini-month:hover{ box-shadow:0 10px 26px rgba(11,61,76,.18); transform:translateY(-2px); }
.mini-month.is-active-month{ border-color:var(--coral); }
.mini-month-title{ font-family:var(--font-mono); font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--deep); font-weight:700; margin-bottom:8px; text-align:center; }
.mini-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.mini-dow{ font-size:8px; text-align:center; color:var(--ink-soft); }
.mini-day{ aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:9.5px; color:var(--ink-soft); border-radius:50%; }
.mini-day.out-range{ visibility:hidden; }
.mini-day.has-event{ font-weight:700; }
.mini-day.status-pending{ background:var(--warn-bg); color:#7a5c00; }
.mini-day.status-confirmed{ background:var(--ok-bg); color:var(--ok); }
.mini-day.status-cancelled{ background:var(--err-bg); color:var(--err); }
.mini-day.status-done{ background:var(--gray-bg); color:var(--gray); }
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <svg class="brand-mark" viewBox="0 0 40 40" fill="none" style="margin:0 auto 12px; display:block;">
      <circle cx="20" cy="20" r="19" stroke="#1C7C82" stroke-width="1.5"/>
      <path d="M4 22c4-4 8 4 12 0s8-4 12 0 8 4 8 4" stroke="#E8734A" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <h1 tr="Hidrosfera Admin">Hidrosfera Admin</h1>
    <p tr="Staff access only.">Staff access only.</p>
    <input type="password" id="adminPasswordInput" placeholder="Password" autocomplete="current-password">
    <div class="login-error" id="loginError"></div>
    <button class="btn btn-primary" id="loginBtn" style="width:100%;" tr="Sign in">Sign in</button>
    <div class="login-hint" tr="Default password: hidrosfera2026 — change it under Settings once you're in. This is a client-side gate for prototyping only; see chat for how to secure this properly with a real backend.">
      Default password: <b>hidrosfera2026</b> — change it under Settings once you're in.<br>
      This is a client-side gate for prototyping only; see chat for how to secure this properly with a real backend.
    </div>
  </div>
</div>

<div id="adminApp" class="hidden">
  <div class="masthead">
    <div class="container">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="19" stroke="#2E9AA0" stroke-width="1.5"/>
          <path d="M4 22c4-4 8 4 12 0s8-4 12 0 8 4 8 4" stroke="#E8734A" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div>
          <div class="brand-name" tr="Hidrosfera">Hidrosfera</div>
          <div class="brand-tag" tr="Admin panel">Admin panel</div>
        </div>
      </div>
      <div class="masthead-right">
        <a href="./hidrosfera-booking.html" target="_blank" rel="noopener" tr="View booking site ↗">View booking site ↗</a>
        <button id="logoutBtn" tr="Log out">Log out</button>
      </div>
    </div>
  </div>

  <div class="tabbar">
    <div class="container" id="tabBar"></div>
  </div>

  <main class="container" id="adminMain"></main>
</div>

<div id="toastHost"></div>
<div id="modalHost"></div>

<script>
/* ---------------------------------------------------------------------
   HOST COMPATIBILITY SHIM — see hidrosfera-booking.html for full notes.
   Recreates window.storage using localStorage when not already present
   (i.e. once hosted outside Claude.ai's sandbox), so the same code runs
   in both places. NOTE: localStorage is per-browser, not a shared
   database — the admin panel will only see bookings made in the same
   browser. A real launch needs a real backend (see Settings tab notes).
   --------------------------------------------------------------------- */
if(!window.storage){
  window.storage = (function(){
    const PREFIX = 'hidrosfera_store::';
    const keyFor = (key, shared) => PREFIX + (shared ? 'shared::' : 'private::') + key;
    return {
      async get(key, shared){
        const raw = localStorage.getItem(keyFor(key, shared));
        if(raw === null) throw new Error('Key not found: ' + key);
        return { key, value: raw, shared: !!shared };
      },
      async set(key, value, shared){
        localStorage.setItem(keyFor(key, shared), value);
        return { key, value, shared: !!shared };
      },
      async delete(key, shared){
        localStorage.removeItem(keyFor(key, shared));
        return { key, deleted: true, shared: !!shared };
      },
      async list(prefix, shared){
        const full = keyFor(prefix || '', shared);
        const base = keyFor('', shared);
        const keys = [];
        for(let i=0; i<localStorage.length; i++){
          const k = localStorage.key(i);
          if(k && k.startsWith(full)) keys.push(k.slice(base.length));
        }
        return { keys, prefix, shared: !!shared };
      }
    };
  })();
}

/* ---- Year-at-a-glance strip: every day gets a filled circle in the
   same status colors as the big calendar; clicking a month jumps the
   big calendar above to that month. ---------------------------------- */
function buildDayStatusMap(year){
  const priority = { pending:4, confirmed:3, cancelled:2, done:1 };
  const map = {};
  getBookingEvents().forEach(e=>{
    const start = parseDate(e.date);
    const end = e.endDate ? parseDate(e.endDate) : start;
    let cur = new Date(start);
    while(cur <= end){
      if(cur.getFullYear() === year){
        const iso = fmtDate(cur);
        if(!map[iso] || priority[e.status] > priority[map[iso]]) map[iso] = e.status;
      }
      cur = new Date(cur.getFullYear(), cur.getMonth(), cur.getDate()+1);
    }
  });
  return map;
}
function renderYearOverview(year){
  const dayStatusMap = buildDayStatusMap(year);
  const months = Array.from({length:12}, (_,m)=>{
    const first = new Date(year, m, 1);
    const startDow = first.getDay();
    const daysInMonth = new Date(year, m+1, 0).getDate();
    const monthName = first.toLocaleDateString('en-US', {month:'short'});
    let cells = '';
    const dows = ['S','M','T','W','T','F','S'];
    cells += dows.map(d=>`<div class="mini-dow">${d}</div>`).join('');
    for(let i=0;i<startDow;i++) cells += `<div class="mini-day out-range"></div>`;
    for(let d=1; d<=daysInMonth; d++){
      const iso = fmtDate(new Date(year,m,d));
      const status = dayStatusMap[iso];
      cells += `<div class="mini-day ${status?'has-event status-'+status:''}">${d}</div>`;
    }
    const isActive = year === state.calMonth.y && m === state.calMonth.m;
    return `<div class="mini-month ${isActive?'is-active-month':''}" data-year-nav-month="${m}" data-year-nav-year="${year}" title="Jump to ${monthName} ${year}">
      <div class="mini-month-title">${monthName}</div>
      <div class="mini-grid">${cells}</div>
    </div>`;
  }).join('');

  return `
  <div class="year-overview">
    <div class="page-head" style="margin-bottom:14px;">
      <div>
        <h3 tr="${year} at a glance">${year} at a glance</h3>
        <div class="stat-sub" tr="Click a month to jump the calendar above.">Click a month to jump the calendar above.</div>
      </div>
      <div class="admin-cal-head" style="gap:4px;">
        <button data-year-overview-nav="prev" aria-label="Previous year">‹</button>
        <div class="admin-cal-title" style="font-size:16px;">${year}</div>
        <button data-year-overview-nav="next" aria-label="Next year">›</button>
      </div>
    </div>
    <div class="year-grid">${months}</div>
  </div>`;
}

}
function adminDaysBetween(startISO, endISO){
  if(!startISO) return 1;
  if(!endISO || endISO === startISO) return 1;
  return Math.round((parseDate(endISO) - parseDate(startISO)) / 86400000) + 1;
}

  if(!a) return 0;

  let total = adminUnitPrice(a) * days;
  if(a.multiDayDiscount && a.multiDayDiscount.minDays && days >= a.multiDayDiscount.minDays){
    const md = a.multiDayDiscount;
    total = md.type==='percent' ? Math.round(total*(1-md.value/100)) : Math.max(0, total-md.value);

  return total;
}

function itemDaysForPersonAdmin(b, p, itemKey){
  return (b.activities||[]).reduce((sum,act)=>{
    if(!(act.assignedPersonIds||[]).includes(p.id)) return sum;
    const a = activityById(act.activityId);
    if(!activityRequiredEquipment(a).includes(itemKey)) return sum;
    return sum + (act.date ? adminDaysBetween(act.date, act.endDate) : 1);
  }, 0);
}
function fullSetDaysForPersonAdmin(b, p, rentedKeys){
  return (b.activities||[]).reduce((sum,act)=>{
    if(!(act.assignedPersonIds||[]).includes(p.id)) return sum;
    const a = activityById(act.activityId);
    const req = activityRequiredEquipment(a);
    if(!rentedKeys.some(k=>req.includes(k))) return sum;
    return sum + (act.date ? adminDaysBetween(act.date, act.endDate) : 1);
  }, 0);
}
function personEquipmentCost(b, p){
  const ep = state.settings.equipmentPricing || {};
  const rentedKeys = Object.keys(EQUIP_LABELS_ADMIN).filter(k=> p.items && p.items[k] && p.items[k].mode==='rent');
  if(!rentedKeys.length) return 0;
  if(rentedKeys.length >= 4 && ep.fullSetPrice) return ep.fullSetPrice * fullSetDaysForPersonAdmin(b, p, rentedKeys);
  return rentedKeys.reduce((s,k)=> s + (ep[k]||0) * itemDaysForPersonAdmin(b, p, k), 0);
}
const LANGUAGE_NATIVE_NAMES_ADMIN = { en:'English', es:'Español', fr:'Français', jp:'日本語', pt:'Português' };
function languageNativeNameAdmin(code){ return LANGUAGE_NATIVE_NAMES_ADMIN[code] || LANGUAGE_NATIVE_NAMES_ADMIN.en; }
function equipmentRentalBreakdownAdmin(b){
  const ep = state.settings.equipmentPricing || {};
  const byItem = {};
  let fullSetCount = 0, fullSetCost = 0, fullSetDays = 0;
  (b.people||[]).forEach(p=>{
    const rentedKeys = Object.keys(EQUIP_LABELS_ADMIN).filter(k=> p.items && p.items[k] && p.items[k].mode==='rent');
    if(!rentedKeys.length) return;
    if(rentedKeys.length >= 4 && ep.fullSetPrice){
      const days = fullSetDaysForPersonAdmin(b, p, rentedKeys);
      if(days<=0) return;
      fullSetCount += 1; fullSetCost += ep.fullSetPrice * days; fullSetDays += days;
      return;
    }
    rentedKeys.forEach(k=>{
      const days = itemDaysForPersonAdmin(b, p, k);
      if(days<=0) return;
      if(!byItem[k]) byItem[k] = { count:0, cost:0, days:0, label:EQUIP_LABELS_ADMIN[k] };
      byItem[k].count += 1;
      byItem[k].cost += (ep[k]||0) * days;
      byItem[k].days += days;
    });
  });
  if(fullSetCount>0) byItem.fullSet = { count: fullSetCount, cost: fullSetCost, days: fullSetDays, label: 'Full equipment set (4+ items)' };
  return byItem;
}
function personActivitiesForAdmin(b, p){
  return (b.activities||[]).filter(act => (act.assignedPersonIds||[]).includes(p.id));
}
function personSummaryLineAdmin(b, p){
  const acts = personActivitiesForAdmin(b, p);
  const numExperiences = acts.length;
  const days = personDaysInBooking(b, p);
  const numRentals = Object.keys(EQUIP_LABELS_ADMIN).filter(k=> p.items && p.items[k] && p.items[k].mode==='rent').length;
  const activitiesCost = acts.reduce((s,act)=> s + (act.unitPrice||0), 0);
  const total = activitiesCost + personEquipmentCost(b, p);
  if(numExperiences === 0) return `No experiences assigned = ${fmtMoneyLong(total)}`;
  const label = numExperiences === 1 ? activityDisplayName(activityById(acts[0].activityId)) : `${numExperiences} Experiences`;
  const rentalsPart = numRentals > 0 ? ` and ${numRentals} rental${numRentals!==1?'s':''}` : '';
  return `${label} for ${days} day${days!==1?'s':''}${rentalsPart} = ${fmtMoneyLong(total)}`;
}
function bookingCostBreakdown(b){
  const overrides = b.amountOverrides || {};
  const actOverrides = overrides.activities || {};

  const activityLines = (b.activities||[]).map(act=>{
    const a = activityById(act.activityId);
    const days = act.date ? adminDaysBetween(act.date, act.endDate) : 1;
    const count = (act.assignedPersonIds||[]).length;
    const computedSubtotal = (act.unitPrice||0) * count;
    const hasOverride = actOverrides[act.activityId] != null;
    const subtotal = hasOverride ? Number(actOverrides[act.activityId]) : computedSubtotal;
    return {
      activityId: act.activityId,
      label: a ? activityDisplayName(a) : 'Unknown experience',
      icon: a ? a.icon : '❓',
      days, count, computedSubtotal, subtotal, hasOverride
    };
  });

  // Equipment total, recomputed live from current admin pricing settings.
  const computedEquipment = (b.people||[]).reduce((s,p)=> s + personEquipmentCost(b,p), 0);
  const equipmentHasOverride = overrides.equipment != null;
  const equipmentTotal = equipmentHasOverride ? Number(overrides.equipment) : computedEquipment;

  const grandTotal = activityLines.reduce((s,l)=>s+l.subtotal, 0) + equipmentTotal;
  return { activityLines, computedEquipment, equipmentTotal, equipmentHasOverride, grandTotal };
}
function bookingTotalAfterDiscount(b){
  const base = bookingCostBreakdown(b).grandTotal;
  if(!b.discount) return base;
  return b.discount.type === 'percent' ? Math.round(base * (1 - b.discount.value/100)) : Math.max(0, base - b.discount.value);
}

function formatFinSizeAdmin(val){
  if(!val) return '';
  const [label, code] = val.split(':');
  const table = label === 'Women' ? FIN_CHART.Female : FIN_CHART.Male;
  const row = table.find(r=>r[0]===code);
  if(!row) return val;
  return `${label} ${code} — EU ${row[1]} · MX ${row[2]} · US ${row[3]}`;
}
function equipmentSummaryLineClientFacing(p){
  if(!p.items) return '—';
  const labels = { bcd:'BCD', computer:'Dive computer', fins:'Fins', mask:'Mask', regulator:'Regulator', wetsuit:'Wetsuit' };
  const ownItems = [], rentalItems = [];
  Object.keys(labels).forEach(key=>{
    const it = p.items[key];
    if(!it || !it.mode) return;
    if(it.mode === 'own') ownItems.push(key==='regulator' && it.regType==='DIN' ? `${labels[key]} [DIN]` : labels[key]);
    else if(it.mode === 'rent'){
      let sizeText = '';
      if(key==='fins' && it.size) sizeText = formatFinSizeAdmin(it.size);
      else if(it.size && it.size !== 'unknown') sizeText = it.size;
      rentalItems.push(sizeText ? `${labels[key]} (${sizeText})` : labels[key]);
    }
  });
  if((p.items.bcd.mode==='rent' && p.items.bcd.size==='unknown') || (p.items.wetsuit.mode==='rent' && p.items.wetsuit.size==='unknown')){
    const hw = p.heightWeight;
    if(hw && (hw.height||hw.weight)) rentalItems.push(`H/W: ${hw.height}${hw.heightUnit||''} / ${hw.weight}${hw.weightUnit||''}`);
  }
  const lines = [];
  if(ownItems.length) lines.push(`Own - ${ownItems.join(', ')}`);
  if(rentalItems.length) lines.push(`Rental - ${rentalItems.join(', ')}`);
  if(p.nitrox) lines.push('Nitrox');
  return lines.length ? lines.join('<br>') : '—';
}
function equipmentSummaryLineAdmin(p){
  if(!p.items) return '—';
  const labels = { bcd:'BCD', computer:'Dive computer', fins:'Fins', mask:'Mask', regulator:'Regulator', wetsuit:'Wetsuit' };
  const parts = Object.keys(labels).map(key=>{
    const it = p.items[key];
    if(!it) return null;
    if(!it.mode){
      // Legacy shape from before the rent/own redesign (checked+size only).
      if(!it.checked) return null;
      const bits = ['Rental'];
      if(it.size) bits.push(key==='fins' ? formatFinSizeAdmin(it.size) : it.size);
      return `${labels[key]} (${bits.join(' · ')})`;
    }
    const bits = [it.mode==='own' ? 'Own' : 'Rental'];
    if(key==='fins' && it.size) bits.push(formatFinSizeAdmin(it.size));
    else if(it.size === 'unknown'){
      const hw = p.heightWeight;
      if(hw && (hw.height||hw.weight)) bits.push(`H/W: ${hw.height}${hw.heightUnit||''} / ${hw.weight}${hw.weightUnit||''}`);
      else bits.push('size unknown');
    }
    else if(it.size) bits.push(it.size);
    else if(it.knowSize===false && (it.height||it.weight)) bits.push(`H/W: ${it.height}${it.heightUnit||''} / ${it.weight}${it.weightUnit||''}`); // legacy per-item H/W
    if(key==='wetsuit' && it.thickness) bits.push(it.thickness);
    if(key==='regulator' && it.mode==='own' && (it.regType||it.isDIN)) bits.push(it.regType || 'DIN');
    if(it.brand || it.model) bits.push([it.brand,it.model].filter(Boolean).join(' '));
    return `${labels[key]} (${bits.join(' · ')})`;
  }).filter(Boolean);
  if(p.estimatedWeight && p.estimatedWeight.amount) parts.push(`Est. weight: ${p.estimatedWeight.amount}${p.estimatedWeight.unit||'kg'}`);
  if(p.weightsUsed){
    if(typeof p.weightsUsed === 'object' && p.weightsUsed.amount) parts.push(`Weights used: ${p.weightsUsed.amount}${p.weightsUsed.unit||'kg'}`);
    else if(typeof p.weightsUsed === 'string') parts.push(`Weights used: ${p.weightsUsed}`); // legacy free-text fallback
  }
  if(p.nitrox) parts.push('Nitrox');

  const extras = [];
  const oe = p.ownEquipment;
  if(oe){
    if(oe.bcd && (oe.bcd.size||oe.bcd.brand||oe.bcd.model)) extras.push('BCD: '+[oe.bcd.brand,oe.bcd.model,oe.bcd.size].filter(Boolean).join(' / '));
    if(oe.fins && (oe.fins.size||oe.fins.brand||oe.fins.model)) extras.push('Fins: '+[oe.fins.brand,oe.fins.model, oe.fins.size?formatFinSizeAdmin(oe.fins.size):''].filter(Boolean).join(' / '));
    if(oe.wetsuit && (oe.wetsuit.size||oe.wetsuit.brand||oe.wetsuit.model)) extras.push('Wetsuit: '+[oe.wetsuit.brand,oe.wetsuit.model,oe.wetsuit.size].filter(Boolean).join(' / '));
    if(oe.mask && (oe.mask.brand||oe.mask.model)) extras.push('Mask: '+[oe.mask.brand,oe.mask.model].filter(Boolean).join(' / '));
    if(oe.regulator && (oe.regulator.type||oe.regulator.brand||oe.regulator.model)) extras.push('Regulator: '+[oe.regulator.type,oe.regulator.brand,oe.regulator.model].filter(Boolean).join(' / '));
    // Legacy single-blob shape from before the per-item redesign.
    if(!oe.bcd && !oe.fins && !oe.wetsuit && !oe.mask && !oe.regulator && (oe.size||oe.brand||oe.model)){
      extras.push('Note: ' + [oe.brand, oe.model, oe.size].filter(Boolean).join(' / '));
    }
  }
  const base = parts.length ? parts.join(', ') : '—';
  return extras.length ? (base + ' — Admin notes: ' + extras.join('; ')) : base;
}

    </div>

    ${b.adminNotes ? `<div class="card" style="margin-top:18px; background:var(--sand);"><div class="section-title">Admin notes</div><p style="font-size:13.5px; white-space:pre-wrap;">${escapeHtml(b.adminNotes)}</p></div>` : ''}

    <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:22px; padding-top:18px; border-top:1px solid var(--line);">
      <select id="bookingStatusSelect_${b.id}" data-change-booking-status="${b.id}" class="status-select status-select-${b.status}">
        <option value="pending" ${b.status==='pending'?'selected':''}>Pending</option>
        <option value="confirmed" ${b.status==='confirmed'?'selected':''}>Confirmed</option>
        <option value="cancelled" ${b.status==='cancelled'?'selected':''}>Cancelled</option>
        <option value="done" ${b.status==='done'?'selected':''}>Done</option>

      ${!isLocked ? `<button class="btn btn-outline" data-start-edit="${b.id}">✎ Edit booking</button>` : ''}

      <button class="btn btn-outline" data-resend-email="${b.id}">✉ Send updated version to client</button>
      ${(b.status==='confirmed' || b.status==='done') ? `<button class="btn btn-outline" data-export-report="${b.id}">⬇ Export trip report (PDF)</button>` : ''}
    </div>
  `;
}

              <select data-draft-hw="weightUnit" data-person-index="${i}" style="flex:0 0 68px; width:68px;">
                <option value="kg" ${(!p.heightWeight||p.heightWeight.weightUnit==='kg')?'selected':''}>kg</option>
                <option value="lb" ${p.heightWeight&&p.heightWeight.weightUnit==='lb'?'selected':''}>lb</option>

            </div>
          </div>
          <div class="field" style="margin-bottom:0;"><label>Weights used (admin — after the trip)</label>
            <div style="display:flex; gap:6px;">
              <input type="number" min="0" data-draft-weights="amount" data-person-index="${i}" value="${(p.weightsUsed&&p.weightsUsed.amount)||''}" style="flex:1;">

                <option value="kg" ${(!p.weightsUsed||p.weightsUsed.unit==='kg')?'selected':''}>kg</option>

            <label style="display:flex; align-items:center; gap:6px; margin-top:8px;"><input type="checkbox" data-draft-nitrox="1" data-person-index="${i}" ${p.nitrox?'checked':''}> Requested</label>

      <button class="icon-btn" style="margin-top:10px;" data-draft-remove-person="${i}">✕ Remove this traveler</button>

  return `
    <div style="padding-right:34px; margin-bottom:16px;">
      <h3>Editing — ${escapeHtml(bookingContactName(draft))}</h3>
      <div style="font-size:12.5px; color:var(--ink-soft); margin-top:4px;">Add or remove travelers, experiences, dates, or equipment sizes, then save. This doesn't notify the client — use the buttons in the booking's normal view for that.</div>

function startEditBooking(bookingId){

  state.bookingDraft = JSON.parse(JSON.stringify(b));
  if(!state.bookingDraft.depositAccount) state.bookingDraft.depositAccount = (state.settings.paymentAccounts||[])[0] || '';
  refreshBookingModal(bookingId);
}
function cancelEditBooking(bookingId){
  state.bookingDraft = null;
  refreshBookingModal(bookingId);
}
function addDraftActivity(){

  const a = state.activities[0];
  state.bookingDraft.activities.push({ activityId:a.id, date: fmtDate(TODAY), endDate:null, assignedPersonIds: state.bookingDraft.people.map(p=>p.id), unitPrice: adminUnitPrice(a) });

}
function removeDraftActivity(idx){

function addDraftPerson(){

function removeDraftPerson(idx){
  if(!state.bookingDraft) return;
  const removed = state.bookingDraft.people[idx];
  state.bookingDraft.people.splice(idx,1);
  state.bookingDraft.activities.forEach(act=>{ act.assignedPersonIds = (act.assignedPersonIds||[]).filter(id=>id!==removed.id); });

}
async function saveBookingDraft(bookingId){
  const draft = state.bookingDraft;
  if(!draft) return;
  const notesInput = document.getElementById('draftAdminNotes');
  draft.adminNotes = notesInput ? notesInput.value : (draft.adminNotes || '');
  draft.total = draft.activities.reduce((sum,act)=> sum + (act.unitPrice||0) * ((act.assignedPersonIds||[]).length), 0);
  const idx = state.bookings.findIndex(x=>x.id===bookingId);
  if(idx>-1) state.bookings[idx] = draft;
  await storeSet(SK.bookings, state.bookings, true);
  await syncBookingPeopleToClientDb(draft);
  state.bookingDraft = null;
  showToast('Booking updated.');
  refreshBookingModal(bookingId);
  renderTab();
}
async function syncBookingPeopleToClientDb(booking){
  const db = await storeGet(SK.clients, true) || {};
  const dateIso = booking.activities[0] ? booking.activities[0].date : '';
  booking.people.forEach(p=>{
    if(!p.email) return;
    const key = p.email.toLowerCase();
    if(!db[key]) db[key] = { history: [] };
    const existingIdx = db[key].history.findIndex(h=>h.bookingCode===booking.bookingCode);
    const entry = { date: dateIso, bookingCode: booking.bookingCode, snapshot: JSON.parse(JSON.stringify(p)) };
    if(existingIdx>-1) db[key].history[existingIdx] = entry; else db[key].history.push(entry);
  });
  await storeSet(SK.clients, db, true);
  state.clients = db;
}

async function adminSetBookingStatus(bookingId, newStatus){
  if(newStatus === 'done'){ promptMarkDone(bookingId); return; }
  const b = state.bookings.find(x=>x.id===bookingId);
  if(!b) return;
  b.status = newStatus;
  await storeSet(SK.bookings, state.bookings, true);
  showToast(`Booking #${b.bookingCode} marked as ${newStatus}. Use "Send updated version to client" if they should be notified.`);
  renderTab();
  refreshBookingModal(bookingId);
}
function promptMarkDone(bookingId){
  const b = state.bookings.find(x=>x.id===bookingId);
  if(!b) return;
  const remaining = Math.max(0, (b.total||0) - bookingCollected(b));
  showModal(`
    <h3 style="padding-right:30px;">Mark booking as done</h3>
    <p style="color:var(--ink-soft); font-size:13.5px; margin:10px 0 16px;">Record the final payment before closing this booking — once marked done, it can no longer be edited. Leave the amount at 0 to skip recording a payment.</p>
    <div class="field-grid">
      <div class="field"><label>Final amount received (MX$)</label><input type="number" min="0" id="finalPaymentInput" value="${remaining}"></div>
      <div class="field"><label>Paid to</label>
        <select id="finalPaymentAccountInput">
          ${(state.settings.paymentAccounts||[]).map(acc=>`<option value="${escapeAttr(acc)}">${escapeHtml(acc)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div style="display:flex; gap:10px; margin-top:20px;">
      <button class="btn btn-primary" data-confirm-mark-done="${b.id}">✓ Confirm &amp; mark done</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>
  `);
}
async function confirmMarkDone(bookingId){
  const b = state.bookings.find(x=>x.id===bookingId);
  if(!b) return;
  const amtInput = document.getElementById('finalPaymentInput');
  const accInput = document.getElementById('finalPaymentAccountInput');
  const amount = amtInput ? (Number(amtInput.value)||0) : 0;
  if(amount > 0){
    if(!b.payments) b.payments = [];
    b.payments.push({ id: uid('pay'), type:'payment', amount, date: fmtDate(TODAY), account: accInput?accInput.value:'' });
    b.deposit = bookingCollected(b);
  }
  b.status = 'done';
  await storeSet(SK.bookings, state.bookings, true);
  showToast(`Booking #${b.bookingCode} marked as done.`);
  closeModal();
  renderTab();
}
function startAddPayment(bookingId){
  state.addingPaymentFor = bookingId;
  refreshBookingModal(bookingId);
}
function cancelAddPayment(bookingId){
  state.addingPaymentFor = null;
  refreshBookingModal(bookingId);
}
async function confirmAddPayment(bookingId){
  const b = state.bookings.find(x=>x.id===bookingId);
  if(!b) return;
  const type = document.getElementById('newPaymentType').value;
  const amount = Number(document.getElementById('newPaymentAmount').value) || 0;
  const date = document.getElementById('newPaymentDate').value || fmtDate(TODAY);
  const account = document.getElementById('newPaymentAccount').value;
  if(amount <= 0){ showToast('Enter an amount greater than zero.'); return; }
  if(!b.payments) b.payments = [];
  b.payments.push({ id: uid('pay'), type, amount, date, account });
  b.deposit = bookingCollected(b); // keep legacy field in sync for anything that still reads it
  await storeSet(SK.bookings, state.bookings, true);
  state.addingPaymentFor = null;
  showToast(`${type==='refund'?'Refund':type==='deposit'?'Deposit':'Payment'} of ${fmtMoney(amount)} recorded.`);
  renderTab();
  refreshBookingModal(bookingId);
}
async function deletePayment(bookingId, paymentId){
  const b = state.bookings.find(x=>x.id===bookingId);
  if(!b || !b.payments) return;
  if(!window.confirm('Remove this payment record? This cannot be undone.')) return;
  b.payments = b.payments.filter(p=>p.id!==paymentId);
  b.deposit = bookingCollected(b);
  await storeSet(SK.bookings, state.bookings, true);
  showToast('Payment removed.');
  renderTab();
  refreshBookingModal(bookingId);
}
async function saveBookingDiscount(bookingId){
  const b = state.bookings.find(x=>x.id===bookingId);
  if(!b) return;
  const type = document.getElementById('bookingDiscountType').value;
  const value = Number(document.getElementById('bookingDiscountValue').value) || 0;
  b.discount = (type && value > 0) ? { type, value } : null;
  await storeSet(SK.bookings, state.bookings, true);
  showToast('Discount saved.');
  renderTab();
  refreshBookingModal(bookingId);
}
async function removeBookingDiscount(bookingId){
  const b = state.bookings.find(x=>x.id===bookingId);
  if(!b) return;
  b.discount = null;
  await storeSet(SK.bookings, state.bookings, true);
  showToast('Discount removed.');
  renderTab();
  refreshBookingModal(bookingId);
}
function startEditAmounts(bookingId){
  state.editingAmountsFor = bookingId;
  refreshBookingModal(bookingId);
}
function cancelEditAmounts(bookingId){
  state.editingAmountsFor = null;
  refreshBookingModal(bookingId);
}
async function saveAmounts(bookingId){
  const b = state.bookings.find(x=>x.id===bookingId);
  if(!b) return;
  const bd = bookingCostBreakdown(b);
  const overrides = { activities: {}, equipment: null };
  bd.activityLines.forEach(l=>{
    const el = document.querySelector(`[data-amt-activity="${l.activityId}"]`);
    const val = el ? Number(el.value) : l.computedSubtotal;
    if(val !== l.computedSubtotal) overrides.activities[l.activityId] = val;
  });
  const equipEl = document.getElementById('amtEquipment');
  const equipVal = equipEl ? Number(equipEl.value) : bd.computedEquipment;
  if(equipVal !== bd.computedEquipment) overrides.equipment = equipVal;
  b.amountOverrides = overrides;
  const computedDeposit = computeSuggestedDeposit(bookingTotalAfterDiscount(b));
  const depositEl = document.getElementById('amtDeposit');
  const depositVal = depositEl ? Number(depositEl.value) : computedDeposit;
  b.depositOverride = (depositVal !== computedDeposit) ? depositVal : null;
  await storeSet(SK.bookings, state.bookings, true);
  state.editingAmountsFor = null;
  showToast('Amounts updated.');
  renderTab();
  refreshBookingModal(bookingId);
}

  .rpt-section-title{ font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:#1C7C82; border-bottom:1px solid #ddd; padding-bottom:6px; margin:22px 0 10px; }

  ${b.adminNotes ? `<div class="rpt-section-title">Notes</div><div class="rpt-notes">${escapeHtml(b.adminNotes)}</div>` : ''}

function exportTripReport(bookingId){
  const b = state.bookings.find(x=>x.id===bookingId);
  if(!b) return;
  const win = window.open('', '_blank');
  if(!win){ showToast('Your browser blocked the report window — allow pop-ups for this site and try again.'); return; }
  win.document.write(buildTripReportHtml(b));
  win.document.close();
  win.focus();
  setTimeout(()=>{ win.print(); }, 300);

function renderAvailabilityEditor(activityId){
  const a = activityById(activityId);
  if(!a) return '';
  const { y, m } = state.availMonth;
  const first = new Date(y, m, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const monthLabel = first.toLocaleDateString('en-US', {month:'long', year:'numeric'});
  const blocked = state.availability[activityId] || [];
  const canGoPrev = new Date(y,m,1) > new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
  const canGoNext = new Date(y,m+1,1) <= MAX_DATE;

  let cells = '';
  const dows = ['S','M','T','W','T','F','S'];
  cells += dows.map(d=>`<div class="admin-cal-dow">${d}</div>`).join('');
  for(let i=0;i<startDow;i++) cells += `<div class="avail-day out-range"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateObj = new Date(y,m,d);
    const iso = fmtDate(dateObj);
    const isPast = dateObj < TODAY;
    const isBlocked = blocked.includes(iso);
    cells += `<button type="button" class="avail-day ${isBlocked?'blocked':''} ${isPast?'past':''}" ${isPast?'disabled':''} data-avail-day="${iso}">${d}</button>`;
  }

  return `
  <div class="card">
    <div class="page-head" style="margin-bottom:14px;">
      <div>
        <h3>${a.icon} ${escapeHtml(a.name)} — availability</h3>
        <div class="stat-sub" style="margin-top:4px;">Click a date to block or unblock it. Blocked dates won't be selectable on the booking site.</div>
      </div>
      <button class="btn btn-outline btn-sm" id="closeAvailEditor">Done</button>
    </div>
    <div class="admin-cal-head">
      <button data-avail-nav="prev" ${canGoPrev?'':'disabled'} aria-label="Previous month">‹</button>
      <div class="admin-cal-title">${monthLabel}</div>
      <button data-avail-nav="next" ${canGoNext?'':'disabled'} aria-label="Next month">›</button>
    </div>
    <div class="admin-cal-grid" style="grid-template-columns:repeat(7,1fr); margin-top:12px;">${cells}</div>
  </div>
  ${renderAvailabilityYearOverview(activityId, state.availMonth.y)}`;
}

function renderAvailabilityYearOverview(activityId, year){
  const blocked = state.availability[activityId] || [];
  const months = Array.from({length:12}, (_,m)=>{
    const first = new Date(year, m, 1);
    const startDow = first.getDay();
    const daysInMonth = new Date(year, m+1, 0).getDate();
    const monthName = first.toLocaleDateString('en-US', {month:'short'});
    let cells = '';
    const dows = ['S','M','T','W','T','F','S'];
    cells += dows.map(d=>`<div class="mini-dow">${d}</div>`).join('');
    for(let i=0;i<startDow;i++) cells += `<div class="mini-day out-range"></div>`;
    for(let d=1; d<=daysInMonth; d++){
      const dateObj = new Date(year,m,d);
      const iso = fmtDate(dateObj);
      const isPast = dateObj < TODAY;
      const isBlocked = blocked.includes(iso);
      const status = isPast ? '' : (isBlocked ? 'cancelled' : 'confirmed');
      cells += `<div class="mini-day ${status?'has-event status-'+status:''}">${d}</div>`;
    }
    const isActive = year === state.availMonth.y && m === state.availMonth.m;
    return `<div class="mini-month ${isActive?'is-active-month':''}" data-avail-year-month-nav="${m}" data-avail-year-nav-year="${year}" title="Jump to ${monthName} ${year}">
      <div class="mini-month-title">${monthName}</div>
      <div class="mini-grid">${cells}</div>
    </div>`;
  }).join('');

  return `
  <div class="year-overview">
    <div class="page-head" style="margin-bottom:14px;">
      <div>
        <h3>${year} at a glance</h3>
        <div class="stat-sub">Green = available · Red = blocked. Click a month to jump the calendar above.</div>
      </div>
      <div class="admin-cal-head" style="gap:4px;">
        <button data-avail-year-nav="prev" aria-label="Previous year">‹</button>
        <div class="admin-cal-title" style="font-size:16px;">${year}</div>
        <button data-avail-year-nav="next" aria-label="Next year">›</button>
      </div>
    </div>
    <div class="year-grid">${months}</div>
  </div>`;
}

function buildActivityFormHtml(a, isNew){
  const dn = asLangObject(a.displayName);
  const cat = asLangObject(a.category);
  const sd = asLangObject(a.shortDesc);

async function saveActivityFromForm(activityId, isNew){
  const get = id => (document.getElementById(id)||{}).value || '';
  const discountType = get('af_discount_type');
  const discountVal = Number(get('af_discount_value'))||0;
  const mddMinDays = Number(get('af_mdd_mindays'))||0;
  const mddVal = Number(get('af_mdd_value'))||0;
  const existing = activityById(activityId);
  const byLang = (prefix) => {
    const o = {};
    CONTENT_LANGS.forEach(([code])=>{ o[code] = get(`${prefix}_${code}`).trim(); });
    return o;
  };
  const listByLang = (prefix) => {
    const o = {};
    CONTENT_LANGS.forEach(([code])=>{ o[code] = get(`${prefix}_${code}`).split('\n').map(s=>s.trim()).filter(Boolean); });
    return o;
  };
  const activityData = {
    id: activityId,
    name: get('af_name').trim() || 'Untitled experience',
    displayName: (()=>{ const d = byLang('af_displayname'); d.en = d.en || get('af_name').trim() || 'Untitled experience'; return d; })(),
    category: (()=>{ const c = byLang('af_category'); c.en = c.en || 'General'; return c; })(),
    divingType: get('af_divingtype') || null,
    icon: get('af_icon').trim() || '🌊',
    image: get('af_image').trim() || null,
    watermarkImage: get('af_watermark').trim() || null,
    price: Number(get('af_price'))||0,
    durationLabel: byLang('af_duration'),
    hours: byLang('af_hours'),
    meetupTime: get('af_meetuptime'),
    durationHours: Number(get('af_duration_hours'))||4,
    requiredEquipment: Object.keys(EQUIP_LABELS_ADMIN).filter(key => (document.getElementById(`af_equip_${key}`)||{}).checked),
    discount: discountType ? { type: discountType, value: discountVal } : null,
    multiDayDiscount: (mddMinDays >= 2 && mddVal > 0) ? { minDays: mddMinDays, type: get('af_mdd_type'), value: mddVal } : null,
    nitroxAvailable: get('af_nitrox_available') === '1',
    nitroxPricePerTank: Number(get('af_nitrox_price'))||200,
    tanksPerDay: Number(get('af_tanks_per_day'))||1,
    shortDesc: byLang('af_shortdesc'),
    longDesc: byLang('af_longdesc'),
    highlights: listByLang('af_highlights'),
    included: listByLang('af_included'),
    bring: listByLang('af_bring'),
    meetingPoint: byLang('af_meeting'),
    active: existing ? existing.active : true,
  };
  if(isNew){ state.activities.push(activityData); }
  else{
    const idx = state.activities.findIndex(x=>x.id===activityId);
    if(idx>-1) state.activities[idx] = activityData;
  }
  await storeSet(SK.activities, state.activities, true);
  showToast('Activity saved.');
  closeModal();
  renderTab();
}
async function deleteActivityConfirmed(activityId){
  state.activities = state.activities.filter(a=>a.id!==activityId);
  await storeSet(SK.activities, state.activities, true);
  showToast('Activity deleted.');
  closeModal();
  renderTab();
}
async function toggleActivityActive(activityId){
  const a = activityById(activityId);
  if(!a) return;
  a.active = !a.active;
  await storeSet(SK.activities, state.activities, true);
  renderTab();
}
async function moveActivity(index, dir){
  const swapWith = dir === 'up' ? index - 1 : index + 1;
  if(swapWith < 0 || swapWith >= state.activities.length) return;
  const arr = state.activities;
  [arr[index], arr[swapWith]] = [arr[swapWith], arr[index]];
  await storeSet(SK.activities, state.activities, true);
  renderTab();
}

async function toggleAvailabilityDay(activityId, iso){
  if(!activityId) return;
  if(!state.availability[activityId]) state.availability[activityId] = [];
  const list = state.availability[activityId];
  const idx = list.indexOf(iso);
  if(idx>-1) list.splice(idx,1); else list.push(iso);
  await storeSet(SK.availability, state.availability, true);
  renderTab();
}

function latestHistoryEntry(rec){
  if(!rec || !rec.history || !rec.history.length) return null;
  return rec.history.reduce((best, h) => (!best || (h.date||'') > (best.date||'')) ? h : best, null);
}
function allClientsList(){
  return Object.keys(state.clients).map(email=>{
    const rec = state.clients[email] || { history: [] };
    const latest = latestHistoryEntry(rec) || {};
    const snap = latest.snapshot || {};
    return {
      email, fullName: snap.fullName || '—', dob: snap.dob || '', language: snap.language || 'en',
      visits: rec.history.length, lastVisit: latest.date || '', allergies: snap.allergies || '', history: rec.history || []
    };
  });
}
function birthdaysThisMonth(){
  const curMonth = TODAY.getMonth();
  return allClientsList().filter(c => c.dob && parseDate(c.dob).getMonth() === curMonth);
}
function findBookingByCode(code){ return state.bookings.find(b=>b.bookingCode===code); }
function renderClientsTab(){
  const q = (state.clientsSearch||'').toLowerCase();
  let clients = allClientsList();
  if(q) clients = clients.filter(c => (c.fullName+' '+c.email).toLowerCase().includes(q));
  if(state.clientsLangFilter && state.clientsLangFilter!=='all') clients = clients.filter(c => (c.language||'en')===state.clientsLangFilter);

  const sortKey = state.clientsSort.key, sortDir = state.clientsSort.dir;
  clients.sort((a,b)=>{
    let av = a[sortKey], bv = b[sortKey];
    if(sortKey==='visits'){ av = a.visits; bv = b.visits; }
    else { av = String(av||'').toLowerCase(); bv = String(bv||'').toLowerCase(); }
    if(av < bv) return sortDir==='asc' ? -1 : 1;
    if(av > bv) return sortDir==='asc' ? 1 : -1;
    return 0;
  });
  const birthdays = birthdaysThisMonth();
  const sortArrow = key => state.clientsSort.key===key ? (state.clientsSort.dir==='asc'?' ▲':' ▼') : '';

  return `
  <div class="page-head">
    <div>
      <div class="page-title" tr="Clients">Clients</div>
      <div class="page-sub" tr="Everyone who has given an email, with their visit history.">Everyone who has given an email, with their visit history.</div>
    </div>
  </div>

  ${birthdays.length ? `
  <div class="card" style="background:var(--warn-bg);">
    <div class="section-title" style="color:#7a5c00;">🎂 Birthdays this month</div>
    <div style="display:flex; flex-direction:column; gap:8px;">
      ${birthdays.map(c=>{
        const dobDate = parseDate(c.dob);
        const turningAge = TODAY.getFullYear() - dobDate.getFullYear();
        return `<div style="display:flex; justify-content:space-between; align-items:center; background:#fff; border-radius:10px; padding:10px 14px;">
          <div>
            <div style="font-weight:600; font-size:14px;">${escapeHtml(c.fullName)}</div>
            <div style="font-size:12px; color:var(--ink-soft);">${fmtDateHuman(c.dob)} · turning ${turningAge}</div>
          </div>
          <button class="btn-text" style="color:#7a5c00; text-decoration:underline;" data-send-birthday="${escapeAttr(c.email)}">Send congratulations</button>
        </div>`;
      }).join('')}
    </div>
  </div>` : ''}

  <div class="toolbar">
    <input type="text" id="clientsSearch" placeholder="Search by name or email…" value="${escapeAttr(state.clientsSearch||'')}">
    <select id="clientsLangFilter">
      <option value="all" ${state.clientsLangFilter==='all'?'selected':''}>All languages</option>
      <option value="en" ${state.clientsLangFilter==='en'?'selected':''}>English</option>
      <option value="es" ${state.clientsLangFilter==='es'?'selected':''}>Español</option>
    </select>
    <span class="stat-sub" style="margin-left:auto;">${clients.length} client${clients.length!==1?'s':''}</span>
  </div>

  <div class="card" style="padding:0; overflow-x:auto;">
    <table>
      <thead><tr>
        <th data-client-sort="fullName" style="cursor:pointer;">Name${sortArrow('fullName')}</th>
        <th data-client-sort="email" style="cursor:pointer;">Email${sortArrow('email')}</th>
        <th data-client-sort="visits" style="cursor:pointer;">Visits${sortArrow('visits')}</th>
        <th data-client-sort="lastVisit" style="cursor:pointer;">Last visit${sortArrow('lastVisit')}</th>
        <th data-client-sort="language" style="cursor:pointer;">Language${sortArrow('language')}</th>
      </tr></thead>
      <tbody>
        ${clients.map(c=>`
          <tr class="table-row" data-open-client="${escapeAttr(c.email)}">
            <td>${escapeHtml(c.fullName)}</td>
            <td>${escapeHtml(c.email)}</td>

async function saveClientProfile(email){
  const rec = state.clients[email];
  if(!rec || !rec.history.length) return;
  const latest = latestHistoryEntry(rec);
  const val = id => (document.getElementById(id)||{}).value || '';
  Object.assign(latest.snapshot, {
    fullName: val('cpFullName'),
    gender: val('cpGender'),
    dob: val('cpDob'),
    nationality: val('cpNationality'),
    language: val('cpLanguage'),
    allergies: val('cpAllergies'),
  });
  await storeSet(SK.clients, state.clients, true);
  // mirror onto any bookings where this person appears
  state.bookings.forEach(b=>{
    (b.people||[]).forEach(p=>{
      if(p.email && p.email.toLowerCase()===email.toLowerCase()){
        Object.assign(p, { fullName: val('cpFullName'), gender: val('cpGender'), dob: val('cpDob'), nationality: val('cpNationality'), language: val('cpLanguage'), allergies: val('cpAllergies') });
      }
    });
  });
  await storeSet(SK.bookings, state.bookings, true);
  showToast('Client profile saved.');
  renderTab();
  openClientDetail(email);
}

async function saveReservationEquip(bookingId, personIndex){
  const b = state.bookings.find(x=>x.id===bookingId);
  if(!b || !b.people[personIndex]) return;
  const p = b.people[personIndex];
  if(!p.items) p.items = {};
  RESV_EQUIP_ITEMS.forEach(def=>{
    const idp = `rsvEq_${def.key}`;
    const modeEl = document.querySelector(`input[name="${idp}_mode"]:checked`);

    it.mode = modeEl ? modeEl.value : '';

function paymentsData(){
  const filter = state.paymentsFilter;
  let total = 0, depositsTotal = 0, count = 0;
  const byActivity = {};
  const peopleByCategory = { scuba:0, freediving:0, snorkel:0, other:0 };
  const includedBookings = [];
  state.bookings.forEach(b=>{
    if(b.status === 'cancelled') return;
    const createdDate = (b.createdAt||'').slice(0,10);
    if(filter.from && createdDate < filter.from) return;
    if(filter.to && createdDate > filter.to) return;
    let bookingTotal = 0;
    (b.activities||[]).forEach(act=>{
      if(filter.activityId !== 'all' && act.activityId !== filter.activityId) return;
      const n = (act.assignedPersonIds||[]).length;
      const amt = (act.unitPrice||0) * n;
      bookingTotal += amt;
      byActivity[act.activityId] = (byActivity[act.activityId]||0) + amt;
      const a = activityById(act.activityId);
      const cat = (a && a.divingType) ? a.divingType : 'other';
      peopleByCategory[cat] = (peopleByCategory[cat]||0) + n;
    });
    if(bookingTotal > 0){
      total += bookingTotal; depositsTotal += (b.deposit||0); count++;
      includedBookings.push({ booking:b, relevantTotal:bookingTotal });
    }
  });
  includedBookings.sort((x,y)=> new Date(y.booking.createdAt) - new Date(x.booking.createdAt));
  return { total, depositsTotal, count, byActivity, peopleByCategory, includedBookings };
}

  state.paymentsFilter = { activityId:'all', from:'', to:'' };
  renderTab();

/* =======================================================================
   TEST DATA GENERATOR — populates realistic sample bookings/clients so
   the calendar, bookings table, clients, and payments tabs have
   something to show. Purely for exploring the interface; real bookings
   come from the customer booking site (hidrosfera-booking.html).
   ======================================================================= */
async function loadSampleData(){
  if(!state.activities || state.activities.length === 0){
    showToast('No activities found yet — open the booking site once first so activities get seeded, then try again.');
    return;
  }
  const acts = state.activities.slice(0, Math.min(6, state.activities.length));
  const firstNames = ['Ana','Carlos','Maria','John','Emily','Diego','Sophie','Luis','Grace','Miguel','Karla','Tom'];
  const lastNames = ['Garcia','Smith','Lopez','Johnson','Martinez','Brown','Hernandez','Davis','Torres','Wilson'];
  const nationalities = ['Mexico','United States','Canada','Spain','Germany','Argentina'];
  const statuses = ['pending','confirmed','cancelled','done'];
  const clientsDb = await storeGet(SK.clients, true) || {};
  const sampleBookings = [];

  function randDate(offsetMin, offsetMax){
    const days = offsetMin + Math.floor(Math.random()*(offsetMax-offsetMin));
    const d = new Date(TODAY); d.setDate(d.getDate()+days);
    return d;
  }
  function randomPerson(forcedDobMonth, forceEmail){
    const fn = firstNames[Math.floor(Math.random()*firstNames.length)];
    const ln = lastNames[Math.floor(Math.random()*lastNames.length)];
    const dobMonth = forcedDobMonth != null ? forcedDobMonth : Math.floor(Math.random()*12);
    const dobYear = 1965 + Math.floor(Math.random()*40);
    const dobDay = 1 + Math.floor(Math.random()*28);
    const dob = `${dobYear}-${String(dobMonth+1).padStart(2,'0')}-${String(dobDay).padStart(2,'0')}`;
    const gender = Math.random() > 0.5 ? 'Male' : 'Female';
    const mkItem = (hasSize) => {
      const mode = Math.random() > 0.3 ? 'rent' : 'own';
      const it = { mode, brand: Math.random()>0.6?'Aqualung':'', model:'' };
      if(hasSize){
        it.knowSize = true;
        it.size = hasSize==='fins' ? (gender==='Male'?'Men:M':'Women:M') : 'M';
        it.height=''; it.heightUnit='cm'; it.weight=''; it.weightUnit='kg';
      }
      if(hasSize==='wetsuit') it.thickness = '3mm';
      return it;
    };
    return {
      id: uid('p'), fullName: `${fn} ${ln}`, gender,
      nationality: nationalities[Math.floor(Math.random()*nationalities.length)],
      dob, dobDay:String(dobDay), dobMonth:String(dobMonth+1), dobYear:String(dobYear),
      allergies: Math.random() > 0.75 ? 'Shellfish allergy' : 'None',
      email: forceEmail || '', language: Math.random() > 0.5 ? 'en' : 'es', notes:'',
      weightsUsed: { amount: Math.random()>0.5 ? String(4+Math.floor(Math.random()*8)) : '', unit:'kg' },
      nitrox: Math.random() > 0.7,
      items: {
        bcd: mkItem('size'), wetsuit: mkItem('wetsuit'), fins: mkItem('fins'),
        mask: mkItem(false), regulator: Object.assign(mkItem(false), { regType: Math.random()>0.5 ? 'DIN' : 'Yoke' }),
        computer: mkItem(false),
      }
    };
  }

  for(let i=0; i<12; i++){
    const activity = acts[i % acts.length];
    const status = statuses[i % statuses.length];
    const numPeople = 1 + Math.floor(Math.random()*3);
    const forcedBirthdayMonth = (i===2 || i===7) ? TODAY.getMonth() : null;
    const mainEmail = `sample.${firstNames[i%firstNames.length].toLowerCase()}${i}@example.com`;
    const mainPerson = randomPerson(forcedBirthdayMonth, mainEmail);
    const people = [mainPerson];
    for(let p=1; p<numPeople; p++) people.push(randomPerson());

    const dateRange = status==='done' ? [-70,-4] : status==='cancelled' ? [-15,45] : [2,75];
    const dateObj = randDate(dateRange[0], dateRange[1]);
    let endDate = null;
    if(Math.random() > 0.75){
      const endObj = new Date(dateObj); endObj.setDate(endObj.getDate() + 1 + Math.floor(Math.random()*2));
      endDate = fmtDate(endObj);
    }
    const unitPrice = activity.discount
      ? (activity.discount.type==='percent' ? Math.round(activity.price*(1-activity.discount.value/100)) : Math.max(0, activity.price-activity.discount.value))
      : activity.price;
    const total = unitPrice * numPeople;
    const deposit = (status==='confirmed' || status==='done') ? Math.round(total*0.3) : 0;
    const createdAt = new Date(dateObj); createdAt.setDate(createdAt.getDate() - (6 + Math.floor(Math.random()*14)));

    const booking = {
      id: uid('bk'),
      bookingCode: `HIDR-${String(dateObj.getFullYear()).slice(-2)}${String(dateObj.getMonth()+1).padStart(2,'0')}-${String(i+1).padStart(4,'0')}`,
      createdAt: createdAt.toISOString(), status,
      pageLanguage: mainPerson.language, sameAsFirst: true,
      mainContact: { fullName: mainPerson.fullName, gender: mainPerson.gender, nationality: mainPerson.nationality, dob: mainPerson.dob, dobDay: mainPerson.dobDay, dobMonth: mainPerson.dobMonth, dobYear: mainPerson.dobYear, allergies: mainPerson.allergies, email: mainEmail, language: mainPerson.language, notes:'' },
      people,
      activities: [{ activityId: activity.id, date: fmtDate(dateObj), endDate, assignedPersonIds: people.map(p=>p.id), unitPrice }],
      total, deposit
    };
    sampleBookings.push(booking);

    if(!clientsDb[mainEmail]) clientsDb[mainEmail] = { history: [] };
    clientsDb[mainEmail].history.push({ date: fmtDate(dateObj), bookingCode: booking.bookingCode, snapshot: JSON.parse(JSON.stringify(mainPerson)) });
  }

  state.bookings = state.bookings.concat(sampleBookings);
  state.clients = clientsDb;
  await storeSet(SK.bookings, state.bookings, true);
  await storeSet(SK.clients, state.clients, true);
  showToast(`Loaded ${sampleBookings.length} sample bookings — check the Calendar, All Bookings, Clients, and Payments tabs.`);
  renderTab();
}

  state.bookings = [];
  state.clients = {};
  await storeSet(SK.bookings, state.bookings, true);
  await storeSet(SK.clients, state.clients, true);
  showToast('All bookings and clients cleared.');
  renderTab();
}

  const saveDiscountBtn = t.closest('[data-save-booking-discount]'); if(saveDiscountBtn){ saveBookingDiscount(saveDiscountBtn.dataset.saveBookingDiscount); return; }
  const removeDiscountBtn = t.closest('[data-remove-discount]'); if(removeDiscountBtn){ removeBookingDiscount(removeDiscountBtn.dataset.removeDiscount); return; }
  const startEditAmountsBtn = t.closest('[data-start-edit-amounts]'); if(startEditAmountsBtn){ startEditAmounts(startEditAmountsBtn.dataset.startEditAmounts); return; }
  const cancelEditAmountsBtn = t.closest('[data-cancel-edit-amounts]'); if(cancelEditAmountsBtn){ cancelEditAmounts(state.editingAmountsFor); return; }
  const saveAmountsBtn = t.closest('[data-save-amounts]'); if(saveAmountsBtn){ saveAmounts(saveAmountsBtn.dataset.saveAmounts); return; }
  const viewAsSent = t.closest('[data-view-as-sent]'); if(viewAsSent){ viewBookingAsSent(viewAsSent.dataset.viewAsSent); return; }
  const resendEmail = t.closest('[data-resend-email]'); if(resendEmail){ adminResendEmail(resendEmail.dataset.resendEmail); return; }
  const exportReport = t.closest('[data-export-report]'); if(exportReport){ exportTripReport(exportReport.dataset.exportReport); return; }
  const openTraveler = t.closest('[data-open-traveler]'); if(openTraveler){ openTravelerPopup(openTraveler.dataset.openTraveler, Number(openTraveler.dataset.personIndex)); return; }
  const saveClientProfileBtn = t.closest('[data-save-client-profile]'); if(saveClientProfileBtn){ saveClientProfile(saveClientProfileBtn.dataset.saveClientProfile); return; }
  const saveOwnEmail = t.closest('[data-save-own-equip-email]'); if(saveOwnEmail){ saveOwnEquipDetailsForEmail(saveOwnEmail.dataset.saveOwnEquipEmail); return; }
  const saveReservationEquipBtn = t.closest('[data-save-reservation-equip]'); if(saveReservationEquipBtn){ saveReservationEquip(saveReservationEquipBtn.dataset.saveReservationEquip, Number(saveReservationEquipBtn.dataset.personIndex)); return; }
  const confirmDone = t.closest('[data-confirm-mark-done]'); if(confirmDone){ confirmMarkDone(confirmDone.dataset.confirmMarkDone); return; }

  const startEdit = t.closest('[data-start-edit]'); if(startEdit){ startEditBooking(startEdit.dataset.startEdit); return; }
  const draftSave = t.closest('[data-draft-save]'); if(draftSave){ saveBookingDraft(draftSave.dataset.draftSave); return; }
  const draftCancel = t.closest('[data-draft-cancel]'); if(draftCancel){ cancelEditBooking(draftCancel.dataset.draftCancel); return; }
  const draftAddAct = t.closest('[data-draft-add-activity]'); if(draftAddAct){ addDraftActivity(); return; }
  const draftRemAct = t.closest('[data-draft-remove-activity]'); if(draftRemAct){ removeDraftActivity(Number(draftRemAct.dataset.draftRemoveActivity)); return; }
  const draftAddPerson = t.closest('[data-draft-add-person]'); if(draftAddPerson){ addDraftPerson(); return; }
  const draftRemPerson = t.closest('[data-draft-remove-person]'); if(draftRemPerson){ removeDraftPerson(Number(draftRemPerson.dataset.draftRemovePerson)); return; }

  if(t.id === 'addActivityBtn'){ openActivityEditor(null); return; }
  const editAct = t.closest('[data-edit-activity]'); if(editAct){ openActivityEditor(editAct.dataset.editActivity); return; }
  const langTab = t.closest('[data-content-lang-tab]');
  if(langTab){
    const lang = langTab.dataset.contentLangTab;
    const bar = langTab.closest('[data-lang-tab-bar]');
    if(bar){
      bar.querySelectorAll('button').forEach(b=>{
        b.classList.toggle('btn-primary', b===langTab);
        b.classList.toggle('btn-outline', b!==langTab);
      });
    }
    document.querySelectorAll('.content-lang-panel').forEach(p=>{
      p.classList.toggle('hidden', p.dataset.contentLangPanel !== lang);
    });
    return;
  }
  const saveAct = t.closest('[data-save-activity]'); if(saveAct){ saveActivityFromForm(saveAct.dataset.saveActivity, saveAct.dataset.isNew==='1'); return; }
  const delAct = t.closest('[data-delete-activity]'); if(delAct){ if(window.confirm('Delete this activity? This cannot be undone.')) deleteActivityConfirmed(delAct.dataset.deleteActivity); return; }
  const toggleAct = t.closest('[data-toggle-active]'); if(toggleAct){ toggleActivityActive(toggleAct.dataset.toggleActive); return; }
  const previewAct = t.closest('[data-preview-activity]'); if(previewAct){ previewActivity(previewAct.dataset.previewActivity); return; }
  const moveAct = t.closest('[data-move-activity]'); if(moveAct){ moveActivity(Number(moveAct.dataset.moveActivity), moveAct.dataset.moveDir); return; }
  const manageAvail = t.closest('[data-manage-avail]');
  if(manageAvail){
    state.availEditingId = manageAvail.dataset.manageAvail;
    state.availMonth = { y: TODAY.getFullYear(), m: TODAY.getMonth() };
    renderTab();
    setTimeout(()=>{ document.getElementById('availEditorSection')?.scrollIntoView({behavior:'smooth', block:'start'}); }, 60);
    return;
  }
  if(t.id === 'closeAvailEditor'){ state.availEditingId = null; renderTab(); return; }
  const availNav = t.closest('[data-avail-nav]');
  if(availNav){
    let { y, m } = state.availMonth;
    if(availNav.dataset.availNav==='prev'){ m--; if(m<0){m=11;y--;} } else { m++; if(m>11){m=0;y++;} }
    state.availMonth = { y, m }; renderTab(); return;
  }
  const availDay = t.closest('[data-avail-day]'); if(availDay && !availDay.disabled){ toggleAvailabilityDay(state.availEditingId, availDay.dataset.availDay); return; }

  const calNav = t.closest('[data-admin-cal-nav]');
  if(calNav){
    let { y, m } = state.calMonth;
    if(calNav.dataset.adminCalNav==='prev'){ m--; if(m<0){m=11;y--;} } else { m++; if(m>11){m=0;y++;} }
    state.calMonth = { y, m }; renderTab(); return;
  }
  const yearNav = t.closest('[data-year-nav-month]');
  if(yearNav){
    state.calMonth = { y: Number(yearNav.dataset.yearNavYear), m: Number(yearNav.dataset.yearNavMonth) };
    renderTab();
    window.scrollTo({top:0, behavior:'smooth'});
    return;
  }
  const yearOverviewNav = t.closest('[data-year-overview-nav]');
  if(yearOverviewNav){
    state.calMonth = { y: state.calMonth.y + (yearOverviewNav.dataset.yearOverviewNav==='prev' ? -1 : 1), m: state.calMonth.m };
    renderTab();
    return;
  }
  const availYearNav = t.closest('[data-avail-year-nav]');
  if(availYearNav){
    state.availMonth = { y: state.availMonth.y + (availYearNav.dataset.availYearNav==='prev' ? -1 : 1), m: state.availMonth.m };
    renderTab();
    return;
  }
  const availYearMonthNav = t.closest('[data-avail-year-month-nav]');
  if(availYearMonthNav){
    state.availMonth = { y: Number(availYearMonthNav.dataset.availYearNavYear), m: Number(availYearMonthNav.dataset.availYearMonthNav) };
    renderTab();
    return;
  }

  const openClient = t.closest('[data-open-client]'); if(openClient){ openClientDetail(openClient.dataset.openClient); return; }
  const clientSortTh = t.closest('[data-client-sort]');
  if(clientSortTh){
    const key = clientSortTh.dataset.clientSort;
    if(state.clientsSort.key === key) state.clientsSort.dir = state.clientsSort.dir==='asc' ? 'desc' : 'asc';
    else state.clientsSort = { key, dir:'asc' };
    renderTab();
    return;
  }
  const sendBday = t.closest('[data-send-birthday]'); if(sendBday){ sendBirthdayEmail(sendBday.dataset.sendBirthday); return; }
  const confirmBday = t.closest('[data-confirm-send-birthday]'); if(confirmBday){ confirmSendBirthday(confirmBday.dataset.confirmSendBirthday); return; }

  if(t.id === 'saveNotifyEmailBtn'){ saveNotifyEmail(); return; }
  if(t.id === 'resetPaymentsFiltersBtn'){ resetPaymentsFilters(); return; }
  if(t.id === 'savePasswordBtn'){ saveAdminPassword(); return; }
  if(t.id === 'loadSampleDataBtn'){ loadSampleData(); return; }
  if(t.id === 'addAccountBtn'){ addPaymentAccountField(); return; }
  if(t.id === 'saveAccountsBtn'){ savePaymentAccounts(); return; }
  if(t.id === 'saveEquipPricingBtn'){ saveEquipmentPricing(); return; }
  const removeAcc = t.closest('[data-remove-account]'); if(removeAcc){ removePaymentAccountField(Number(removeAcc.dataset.removeAccount)); return; }
  if(t.id === 'clearSampleDataBtn'){ clearSampleData(); return; }
});

    return;
  }
  if(t.matches('[data-preview-lang]')){ previewActivity(t.dataset.previewLang, t.value); return; }
  if(t.id === 'clientsLangFilter'){ state.clientsLangFilter = t.value; renderTab(); return; }
  if(t.matches('[data-change-booking-status]')){ adminSetBookingStatus(t.dataset.changeBookingStatus, t.value); return; }
  if(t.id === 'paymentsActivityFilter'){ state.paymentsFilter.activityId = t.value; renderTab(); return; }
  if(t.id === 'paymentsFrom'){ state.paymentsFilter.from = t.value; renderTab(); return; }
  if(t.id === 'paymentsTo'){ state.paymentsFilter.to = t.value; renderTab(); return; }

  if(!state.bookingDraft) return;
  const draft = state.bookingDraft;

  if(t.matches('[data-draft-activity-field]')){
    const act = draft.activities[Number(t.dataset.activityIndex)];
    if(!act) return;
    const field = t.dataset.draftActivityField;
    if(field === 'activityId') act.activityId = t.value;
    else act[field] = t.value || null;
    const a = activityById(act.activityId);
    if(a) act.unitPrice = adminPerPersonPrice(a, act);
    return;
  }
  if(t.matches('[data-draft-person-field]')){
    const p = draft.people[Number(t.dataset.personIndex)];
    if(p) p[t.dataset.draftPersonField] = t.value;
    return;
  }
  if(t.matches('[data-draft-contact-field]')){
    draft.mainContact[t.dataset.draftContactField] = t.value;
    return;
  }
  if(t.matches('[data-draft-eq-mode]')){
    const p = draft.people[Number(t.dataset.personIndex)];
    if(!p) return;
    if(!p.items) p.items = {};
    const key = t.dataset.eqItem;
    if(!p.items[key]) p.items[key] = {};
    p.items[key].mode = t.dataset.draftEqMode;
    refreshBookingModal(draft.id);
    return;
  }
  if(t.matches('[data-draft-eq-field]')){
    const p = draft.people[Number(t.dataset.personIndex)];
    if(!p || !p.items) return;
    const key = t.dataset.eqItem;
    if(!p.items[key]) p.items[key] = {};
    const val = t.type === 'checkbox' ? t.checked : t.value;
    p.items[key][t.dataset.draftEqField] = val;
    return;
  }
  if(t.matches('[data-draft-weights]')){
    const p = draft.people[Number(t.dataset.personIndex)];
    if(!p) return;
    if(!p.weightsUsed) p.weightsUsed = { amount:'', unit:'kg' };
    p.weightsUsed[t.dataset.draftWeights] = t.value;
    return;
  }
  if(t.matches('[data-draft-hw]')){
    const p = draft.people[Number(t.dataset.personIndex)];
    if(!p) return;
    if(!p.heightWeight) p.heightWeight = { height:'', heightUnit:'cm', weight:'', weightUnit:'kg' };
    p.heightWeight[t.dataset.draftHw] = t.value;
    return;
  }
  if(t.matches('[data-draft-nitrox]')){
    const p = draft.people[Number(t.dataset.personIndex)];
    if(p) p.nitrox = t.checked;
    return;
  }
  if(t.matches('[data-draft-assign-activity]')){
    const act = draft.activities[Number(t.dataset.draftAssignActivity)];
    if(!act) return;
    act.assignedPersonIds = act.assignedPersonIds || [];
    const pid = t.dataset.assignPersonId;
    const idx = act.assignedPersonIds.indexOf(pid);
    if(t.checked){ if(idx === -1) act.assignedPersonIds.push(pid); }
    else { if(idx > -1) act.assignedPersonIds.splice(idx, 1); }
    return;
  }
});
document.addEventListener('input', (e)=>{
  const t = e.target;
  if(t.id === 'bookingsSearch'){ state.bookingsFilter.q = t.value; renderTab(); return; }
  if(t.id === 'clientsSearch'){ state.clientsSearch = t.value; renderTab(); return; }
});
document.addEventListener('keydown', (e)=>{
  if(e.target && e.target.id === 'adminPasswordInput' && e.key === 'Enter') attemptLogin();
});

/* =======================================================================
   INIT
   ======================================================================= */
async function init(){
  await loadAll();
  const session = await storeGet(SESSION_KEY, false);
  if(session && session.loggedIn){ enterApp(); }
}
init();

</script>

</html>
